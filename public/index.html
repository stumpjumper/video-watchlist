<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watchlist</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #18181b;
      color: #e4e4e7;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      min-height: 100vh;
      -webkit-text-size-adjust: 100%;
    }

    .container { max-width: 860px; margin: 0 auto; padding: 24px 16px 64px; }

    /* ── Header ── */

    header {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 20px; padding-bottom: 16px;
      border-bottom: 1px solid #3f3f46; flex-wrap: wrap;
    }
    h1 { font-size: 20px; font-weight: 600; color: #f4f4f5; flex-shrink: 0; }
    .count { color: #71717a; font-size: 14px; flex: 1; min-width: 60px; }

    .hdr-btn {
      background: none; border: 1px solid #3f3f46; color: #a1a1aa;
      padding: 5px 12px; border-radius: 6px; cursor: pointer;
      font-size: 13px; white-space: nowrap;
      transition: border-color 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .hdr-btn:hover         { border-color: #71717a; color: #e4e4e7; }
    .hdr-btn.active        { border-color: #6366f1; color: #a5b4fc; }
    .hdr-btn.add-btn       { color: #4ade80; }
    .hdr-btn.add-btn:hover { border-color: #4ade80; }

    /* ── Purge banner ── */

    .purge-banner {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      background: #2d1f07; border: 1px solid #854d0e;
      border-radius: 8px; padding: 10px 14px; margin-bottom: 20px;
      font-size: 14px; color: #fde68a;
    }
    .purge-banner span { flex: 1; }
    .purge-banner-btn {
      background: none; border: 1px solid #854d0e; color: #fde68a;
      padding: 4px 10px; border-radius: 5px; cursor: pointer;
      font-size: 12px; white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .purge-banner-btn:hover { border-color: #fde68a; }
    .purge-banner-btn.danger { border-color: #f87171; color: #f87171; }
    .purge-banner-btn.danger:hover { background: #2d1f1f; }

    /* ── Badges ── */

    .badge {
      display: inline-block; font-size: 11px; font-weight: 700;
      padding: 2px 8px; border-radius: 99px;
      text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap;
    }
    .badge-new     { background: #1e3a5f; color: #93c5fd; }
    .badge-started { background: #3b1f0a; color: #fb923c; }
    .badge-purge   { background: #2d1f07; color: #fbbf24; border: 1px solid #854d0e; }

    /* ── Active list ── */

    #list { list-style: none; }

    .video-card {
      display: grid;
      grid-template-columns: 1fr 44px;
      grid-template-rows: auto auto auto auto;
      grid-template-areas: "channel del" "title del" "summbtn del" "badge del";
      column-gap: 10px; row-gap: 3px; padding: 14px 0;
      border-bottom: 1px solid #27272a;
    }

    .card-summbtn {
      grid-area: summbtn;
      color: #71717a; font-size: 12px; cursor: pointer;
      padding: 2px 0; white-space: nowrap; align-self: start;
      -webkit-tap-highlight-color: transparent;
    }
    .card-summbtn:active { color: #a1a1aa; }

    .summary-html {
      background: #1e1e21; border: 1px solid #3f3f46; border-radius: 8px;
      padding: 16px 18px; margin: 12px 0 16px;
      max-height: 55vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
      font-size: 14px; line-height: 1.6; color: #d4d4d8;
    }
    .summary-html h3 {
      color: #f4f4f5; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.07em; margin: 14px 0 6px;
    }
    .summary-html h3:first-child { margin-top: 0; }
    .summary-html p  { margin-bottom: 10px; }
    .summary-html ul, .summary-html ol { padding-left: 18px; margin-bottom: 10px; }
    .summary-html li { margin-bottom: 5px; }
    .summary-html strong { color: #e4e4e7; }

    .copy-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .btn-copy-opt {
      flex: 1; background: #3f3f46; border: 1px solid #52525b;
      color: #a1a1aa; padding: 9px 0; border-radius: 7px;
      cursor: pointer; font-size: 13px;
      -webkit-tap-highlight-color: transparent; transition: background 0.1s;
    }
    .btn-copy-opt:active  { background: #52525b; }
    .btn-copy-opt.copied  { color: #4ade80; border-color: #4ade80; }
    .btn-copy-opt:disabled { opacity: 0.4; cursor: default; }
    .video-card:last-child { border-bottom: none; }
    .card-channel {
      grid-area: channel; font-size: 13px; color: #a1a1aa;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; align-self: end;
    }
    .card-title {
      grid-area: title; color: #93c5fd; cursor: pointer;
      font-size: 16px; font-weight: 450; line-height: 1.35;
    }
    .card-title:active { color: #bfdbfe; }
    .card-badge { grid-area: badge; align-self: start; padding-top: 2px; }
    .card-del {
      grid-area: del; align-self: center; background: none;
      border: 1px solid #3f3f46; color: #f87171;
      width: 44px; height: 44px; border-radius: 8px; cursor: pointer;
      font-size: 18px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.1s, border-color 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .card-del:active { background: #2d1f1f; border-color: #f87171; }

    /* ── Removed section ── */

    .removed-section { margin-top: 32px; }
    .removed-header {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #27272a;
    }
    .removed-header-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; color: #a1a1aa; flex: 1;
    }
    .btn-purge-all {
      background: none; border: 1px solid #3f3f46; color: #f87171;
      padding: 4px 10px; border-radius: 5px; cursor: pointer;
      font-size: 12px; white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-purge-all:active { background: #2d1f1f; border-color: #f87171; }

    #removed-list { list-style: none; }

    .removed-card {
      display: grid;
      grid-template-columns: 1fr auto auto;
      grid-template-rows: auto auto auto;
      grid-template-areas: "channel . ." "title title title" "actions actions actions";
      column-gap: 8px; row-gap: 4px; padding: 12px 0;
      border-bottom: 1px solid #1f1f23; opacity: 0.85;
    }
    .removed-card:last-child { border-bottom: none; }
    .removed-card.purge-ready { opacity: 1; }

    .removed-channel {
      grid-area: channel; font-size: 12px; color: #a1a1aa;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; align-self: center;
    }
    .removed-title {
      grid-area: title; font-size: 14px; line-height: 1.35; color: #71717a;
    }
    .removed-title a { color: inherit; text-decoration: none; }
    .removed-title a:hover { color: #71717a; text-decoration: underline; }
    .removed-actions {
      grid-area: actions; display: flex; gap: 6px; flex-wrap: wrap; padding-top: 4px;
    }
    .btn-sm {
      background: none; border: 1px solid #3f3f46; color: #a1a1aa;
      padding: 4px 10px; border-radius: 5px; cursor: pointer; font-size: 12px;
      white-space: nowrap; transition: border-color 0.1s, color 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-sm:active     { border-color: #71717a; color: #e4e4e7; }
    .btn-sm.del        { color: #f87171; border-color: #3f3f46; }
    .btn-sm.del:active { background: #2d1f1f; border-color: #f87171; }

    /* ── Desktop layout ── */

    @media (min-width: 600px) {
      .video-card {
        grid-template-columns: 160px 1fr 80px 96px 36px;
        grid-template-rows: auto auto;
        grid-template-areas:
          "channel title   badge date del"
          ".       summbtn .     .    del";
        align-items: center; column-gap: 14px; padding: 11px 0;
      }
      .card-title   { font-size: 15px; }
      .card-badge   { padding-top: 0; }
      .card-summbtn { align-self: start; padding: 1px 0 5px; }
      .summary-modal { max-width: 640px; }
      .card-date {
        grid-area: date; font-size: 13px; color: #71717a;
        text-align: right; white-space: nowrap;
      }
      .card-del { width: 36px; height: 36px; font-size: 14px; border-radius: 6px; }

      .list-header {
        display: grid;
        grid-template-columns: 160px 1fr 80px 96px 36px;
        column-gap: 14px; padding: 0 0 10px; margin-bottom: 2px;
        border-bottom: 1px solid #3f3f46;
        font-size: 11px; font-weight: 600;
        text-transform: uppercase; letter-spacing: 0.06em; color: #71717a;
      }

      .removed-card {
        grid-template-columns: 160px 1fr auto auto auto;
        grid-template-rows: auto;
        grid-template-areas: "channel title date restore del";
        align-items: center; column-gap: 12px; padding: 9px 0;
      }
      .removed-card .removed-actions { display: contents; padding-top: 0; }
      .removed-card .removed-actions .btn-sm:nth-child(1) { grid-area: restore; }
      .removed-card .removed-actions .btn-sm:nth-child(2) { grid-area: restore; }
      .removed-date {
        grid-area: date; font-size: 12px; color: #3f3f46;
        text-align: right; white-space: nowrap;
      }
    }

    @media (max-width: 599px) {
      .list-header { display: none; }
      .card-date   { display: none; }
      .removed-date { display: none; }
    }

    /* ── Empty ── */

    .empty { color: #52525b; text-align: center; padding: 64px 0; font-size: 16px; }

    /* ── Modals ── */

    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 100;
      align-items: flex-end; justify-content: center;
    }
    .overlay.open { display: flex; }

    .modal {
      background: #27272a; border-top: 1px solid #3f3f46;
      border-radius: 16px 16px 0 0; padding: 20px 20px 36px; width: 100%;
    }

    @media (min-width: 600px) {
      .overlay { align-items: center; padding: 24px; }
      .modal { border: 1px solid #3f3f46; border-radius: 12px; padding: 28px; max-width: 480px; }
    }

    .modal-handle {
      width: 40px; height: 4px; background: #52525b;
      border-radius: 2px; margin: 0 auto 20px;
    }
    @media (min-width: 600px) { .modal-handle { display: none; } }

    .modal-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; color: #71717a; margin-bottom: 8px;
    }
    .modal-title {
      font-size: 17px; color: #f4f4f5; font-weight: 500;
      margin-bottom: 10px; line-height: 1.4;
    }
    .modal-summary {
      background: #1e1e21; border: 1px solid #3f3f46;
      border-radius: 8px; padding: 12px 14px; margin-bottom: 16px;
      font-size: 14px; color: #a1a1aa; line-height: 1.55;
      white-space: pre-wrap; max-height: 260px; overflow-y: auto;
    }
    .btn-summary-toggle {
      background: none; border: 1px solid #3f3f46; color: #71717a;
      padding: 5px 12px; border-radius: 6px; cursor: pointer;
      font-size: 12px; margin-bottom: 14px; display: block;
      transition: border-color 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-summary-toggle:hover { border-color: #71717a; color: #a1a1aa; }

    .modal-url-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 20px;
      padding: 8px 10px; background: #18181b;
      border-radius: 6px; border: 1px solid #3f3f46;
    }
    .modal-url {
      flex: 1; font-size: 12px; color: #71717a;
      font-family: ui-monospace, monospace;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0;
    }
    .btn-copy {
      background: none; border: 1px solid #3f3f46; color: #a1a1aa;
      padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;
      white-space: nowrap; flex-shrink: 0; transition: color 0.1s, border-color 0.1s;
    }
    .btn-copy.copied { color: #4ade80; border-color: #4ade80; }

    .modal-actions { display: flex; flex-direction: column; gap: 10px; }

    /* Add modal fields */
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .field label { font-size: 12px; color: #a1a1aa; font-weight: 500; }
    .field-row { display: flex; gap: 8px; }
    .field-row .field { flex: 1; margin-bottom: 0; }
    .field-row .field-emoji { flex: 0 0 72px; }

    input[type="text"], input[type="url"] {
      background: #18181b; border: 1px solid #3f3f46;
      color: #e4e4e7; padding: 10px 12px; border-radius: 8px;
      font-size: 15px; width: 100%; outline: none;
      transition: border-color 0.15s; -webkit-appearance: none;
    }
    input:focus { border-color: #6366f1; }
    input::placeholder { color: #52525b; }

    .fetch-status { font-size: 12px; color: #71717a; min-height: 16px; margin-top: -8px; }
    .fetch-status.ok  { color: #4ade80; }
    .fetch-status.err { color: #f87171; }

    .btn {
      border: none; padding: 15px 18px; border-radius: 10px; cursor: pointer;
      font-size: 16px; font-weight: 500; text-align: left; width: 100%;
      -webkit-tap-highlight-color: transparent; transition: filter 0.1s;
    }
    .btn:active  { filter: brightness(0.85); }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn-primary   { background: #2563eb; color: #fff; }
    .btn-green     { background: #166534; color: #bbf7d0; }
    .btn-orange    { background: #9a3412; color: #fed7aa; }
    .btn-secondary { background: #3f3f46; color: #e4e4e7; }
    .btn-cancel    { background: #27272a; color: #71717a; border: 1px solid #3f3f46; margin-top: 4px; }

    @media (min-width: 600px) {
      .btn { padding: 11px 16px; font-size: 14px; border-radius: 7px; }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>📺 Watchlist</h1>
    <span class="count" id="count"></span>
    <button class="hdr-btn" id="btn-show-removed" title="Show videos you previously removed">Show removed</button>
    <button class="hdr-btn add-btn" id="btn-show-add" title="Add a video manually">+ Add</button>
  </header>

  <!-- Purge banner: shown when ≥10 removed items are 90+ days old -->
  <div class="purge-banner" id="purge-banner" style="display:none">
    <span id="purge-banner-msg"></span>
    <button class="purge-banner-btn" id="btn-purge-review">Review</button>
    <button class="purge-banner-btn danger" id="btn-purge-all-banner">Delete all</button>
    <button class="purge-banner-btn" id="btn-purge-dismiss" title="Dismiss for now">✕</button>
  </div>

  <div class="list-header" aria-hidden="true">
    <span>Channel</span><span>Title</span><span>Status</span>
    <span style="text-align:right">Added</span><span></span>
  </div>

  <ul id="list"></ul>
  <div class="empty" id="empty" style="display:none">Nothing in the watchlist.</div>

  <!-- Removed section -->
  <div class="removed-section" id="removed-section" style="display:none">
    <div class="removed-header">
      <span class="removed-header-label">Removed</span>
      <button class="btn-purge-all" id="btn-purge-all-section"
        style="display:none" title="Permanently delete all items ready for cleanup">
        Purge ready
      </button>
    </div>
    <ul id="removed-list"></ul>
    <div class="empty" id="removed-empty" style="display:none">Nothing here yet.</div>
  </div>
</div>

<!-- Action modal -->
<div class="overlay" id="action-overlay" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-label">Open video</div>
    <div class="modal-title"  id="action-title"></div>
    <div class="modal-url-row">
      <span class="modal-url" id="action-url"></span>
      <button class="btn-copy" id="btn-copy" title="Copy URL to clipboard">Copy</button>
    </div>
    <div class="modal-actions" id="action-btns"></div>
  </div>
</div>

<!-- Add video modal -->
<div class="overlay" id="add-overlay" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-label">Add video</div>

    <div class="field">
      <label for="add-url">YouTube URL</label>
      <input type="url" id="add-url" placeholder="https://www.youtube.com/watch?v=…"
        autocomplete="off" autocorrect="off" spellcheck="false">
      <span class="fetch-status" id="fetch-status"></span>
    </div>

    <div class="field-row">
      <div class="field">
        <label for="add-title">Title</label>
        <input type="text" id="add-title" placeholder="Video title">
      </div>
      <div class="field field-emoji">
        <label for="add-emoji">Emoji</label>
        <input type="text" id="add-emoji" placeholder="📺" value="📺">
      </div>
    </div>

    <div class="field">
      <label for="add-channel">Channel</label>
      <input type="text" id="add-channel" placeholder="Channel name">
    </div>

    <div class="modal-actions">
      <button class="btn btn-green" id="btn-add-submit" disabled>Add to watchlist</button>
      <button class="btn btn-cancel" id="btn-add-cancel">Cancel</button>
    </div>
  </div>
</div>

<!-- Summary overlay -->
<div class="overlay" id="summary-overlay" role="dialog" aria-modal="true">
  <div class="modal summary-modal">
    <div class="modal-handle"></div>
    <div class="modal-label">Summary</div>
    <div class="modal-title" id="summary-overlay-title"></div>
    <div class="summary-html" id="summary-html-content"></div>
    <div class="modal-actions">
      <div class="copy-row">
        <button class="btn-copy-opt" id="btn-copy-plain">Plain text</button>
        <button class="btn-copy-opt" id="btn-copy-html">HTML</button>
        <button class="btn-copy-opt" id="btn-copy-md">Markdown</button>
      </div>
      <button class="btn btn-cancel" id="btn-summary-overlay-close">Close</button>
    </div>
  </div>
</div>

<script>
  let current       = null;
  let showRemoved   = false;
  let fetchTimer    = null;
  let purgeDismissed = false;

  /* ── utils ── */

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function fmtDate(iso) {
    return new Date(iso).toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric' });
  }

  function openUrl(url) {
    const a = document.createElement('a');
    a.href = url; a.target = '_blank'; a.rel = 'noopener noreferrer';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }

  /* ── load & render active list ── */

  async function load() {
    const data = await fetch('/api/videos').then(r => r.json());
    render(data.videos);
    updatePurgeBanner(data.purge_ready_count || 0);
    if (showRemoved) loadRemoved();
  }

  function render(videos) {
    const list  = document.getElementById('list');
    const empty = document.getElementById('empty');
    const count = document.getElementById('count');

    if (!videos.length) {
      list.innerHTML = ''; empty.style.display = ''; count.textContent = ''; return;
    }
    empty.style.display = 'none';
    const nNew     = videos.filter(v => v.status === 'new').length;
    const nStarted = videos.filter(v => v.status === 'started').length;
    count.textContent = [nNew && nNew+' new', nStarted && nStarted+' started'].filter(Boolean).join(', ');

    list.innerHTML = videos.map(v => {
      const badge = v.status === 'started'
        ? '<span class="badge badge-started">Started</span>'
        : '<span class="badge badge-new">New</span>';
      return `
        <li class="video-card">
          <span class="card-channel">${esc(v.emoji)} ${esc(v.channel_name)}</span>
          <span class="card-title"
            data-id="${v.id}" data-title="${esc(v.title)}"
            data-url="${esc(v.url)}" data-status="${v.status}"
            data-summary="${esc(v.summary || '')}"
            title="Tap to open">${esc(v.title)}</span>
          <span class="btn-card-summary" role="button" tabindex="0"
            data-id="${v.id}" data-title="${esc(v.title)}"
            data-summary="${esc(v.summary || '')}">Summary</span>
          <span class="card-badge">${badge}</span>
          <span class="card-date">${fmtDate(v.added_at)}</span>
          <button class="card-del" data-id="${v.id}"
            aria-label="Remove from watchlist" title="Remove from watchlist">✕</button>
        </li>`;
    }).join('');
  }

  /* ── purge banner ── */

  function updatePurgeBanner(count) {
    const banner = document.getElementById('purge-banner');
    if (count >= 10 && !purgeDismissed) {
      document.getElementById('purge-banner-msg').textContent =
        `⚠️ ${count} removed video${count !== 1 ? 's are' : ' is'} over 90 days old and ready to clean up.`;
      banner.style.display = '';
    } else {
      banner.style.display = 'none';
    }
  }

  document.getElementById('btn-purge-review').addEventListener('click', () => {
    if (!showRemoved) document.getElementById('btn-show-removed').click();
    document.getElementById('removed-section').scrollIntoView({ behavior: 'smooth' });
  });

  document.getElementById('btn-purge-all-banner').addEventListener('click', async () => {
    await fetch('/api/videos/purge', { method: 'DELETE' });
    purgeDismissed = false;
    load();
    if (showRemoved) loadRemoved();
  });

  document.getElementById('btn-purge-dismiss').addEventListener('click', () => {
    purgeDismissed = true;
    document.getElementById('purge-banner').style.display = 'none';
  });

  /* ── load & render removed list ── */

  async function loadRemoved() {
    const data = await fetch('/api/videos/removed').then(r => r.json());
    renderRemoved(data.videos, data.purge_ready_count);
  }

  function renderRemoved(videos, purgeReadyCount) {
    const list  = document.getElementById('removed-list');
    const empty = document.getElementById('removed-empty');
    const purgeBtn = document.getElementById('btn-purge-all-section');

    purgeBtn.style.display = purgeReadyCount > 0 ? '' : 'none';
    if (purgeReadyCount > 0) purgeBtn.textContent = `Purge ready (${purgeReadyCount})`;

    if (!videos.length) {
      list.innerHTML = ''; empty.style.display = ''; return;
    }
    empty.style.display = 'none';

    list.innerHTML = videos.map(v => {
      const badge = v.purge_ready
        ? '<span class="badge badge-purge" title="Over 90 days old">Ready to purge</span> '
        : '';
      return `
        <li class="removed-card${v.purge_ready ? ' purge-ready' : ''}">
          <span class="removed-channel">${esc(v.emoji)} ${esc(v.channel_name)}</span>
          <span class="removed-title">
            ${badge}<a href="${esc(v.url)}" target="_blank" rel="noopener noreferrer"
              title="${esc(v.url)}">${esc(v.title)}</a>
          </span>
          <span class="removed-date">${v.removed_at ? fmtDate(v.removed_at) : ''}</span>
          <div class="removed-actions">
            <button class="btn-sm" data-id="${v.id}" data-action="restore"
              title="Put back in watchlist as New">Restore</button>
            <button class="btn-sm" data-id="${v.id}" data-action="reset-clock"
              title="Reset the 90-day clock — gives another 3 months before it's purge-ready">Reset clock</button>
            <button class="btn-sm del" data-id="${v.id}" data-action="delete"
              title="Permanently delete">Delete</button>
          </div>
        </li>`;
    }).join('');
  }

  /* ── removed section actions ── */

  document.getElementById('removed-list').addEventListener('click', async e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const { id, action } = btn.dataset;

    if (action === 'restore') {
      await fetch(`/api/videos/${id}/restore`, { method: 'POST' });
      load();
    } else if (action === 'reset-clock') {
      await fetch(`/api/videos/${id}/reset-clock`, { method: 'POST' });
      loadRemoved();
    } else if (action === 'delete') {
      await fetch(`/api/videos/${id}`, { method: 'DELETE' });
      load();
    }
  });

  document.getElementById('btn-purge-all-section').addEventListener('click', async () => {
    await fetch('/api/videos/purge', { method: 'DELETE' });
    load();
  });

  /* ── show removed toggle ── */

  document.getElementById('btn-show-removed').addEventListener('click', () => {
    showRemoved = !showRemoved;
    const btn = document.getElementById('btn-show-removed');
    btn.textContent = showRemoved ? 'Hide removed' : 'Show removed';
    btn.classList.toggle('active', showRemoved);
    const section = document.getElementById('removed-section');
    section.style.display = showRemoved ? '' : 'none';
    if (showRemoved) loadRemoved();
  });

  /* ── active list clicks ── */

  document.getElementById('list').addEventListener('click', e => {
    const titleEl = e.target.closest('.card-title');
    if (titleEl) {
      current = { id: titleEl.dataset.id, title: titleEl.dataset.title,
                  url: titleEl.dataset.url, status: titleEl.dataset.status,
                  summary: titleEl.dataset.summary || '' };
      document.getElementById('action-title').textContent = current.title;
      document.getElementById('action-url').textContent   = current.url;
      buildActionBtns(current.status);
      document.getElementById('action-overlay').classList.add('open');
      return;
    }
    const summBtn = e.target.closest('.btn-card-summary');
    if (summBtn) {
      openSummaryOverlay({ id: summBtn.dataset.id, title: summBtn.dataset.title,
                           summary: summBtn.dataset.summary || '' });
      return;
    }
    const del = e.target.closest('.card-del');
    if (del) fetch(`/api/videos/${del.dataset.id}/removed`, { method: 'POST' }).then(load);
  });

  /* ── action modal ── */

  function buildActionBtns(status) {
    const el = document.getElementById('action-btns');
    if (status === 'new') {
      el.innerHTML = `
        <button class="btn btn-primary" id="ab-started"
          title="Flags it as started but keeps it in your list">Mark as started &amp; open</button>
        <button class="btn btn-orange" id="ab-remove"
          title="Opens it and moves it to removed — you're confident you'll finish it">Remove &amp; open</button>
        <button class="btn btn-secondary" id="ab-just">Just open</button>
        <button class="btn btn-cancel" id="ab-cancel">Cancel</button>`;
    } else {
      el.innerHTML = `
        <button class="btn btn-orange" id="ab-remove"
          title="Opens it and moves it to removed">Remove &amp; open</button>
        <button class="btn btn-secondary" id="ab-just">Just open</button>
        <button class="btn btn-cancel" id="ab-cancel">Cancel</button>`;
    }

    const s = document.getElementById('ab-started');
    if (s) s.addEventListener('click', () => {
      if (!current) return;
      openUrl(current.url);
      fetch(`/api/videos/${current.id}/started`, { method: 'POST' }).then(load);
      closeActionModal();
    });

    document.getElementById('ab-remove').addEventListener('click', () => {
      if (!current) return;
      openUrl(current.url);
      fetch(`/api/videos/${current.id}/removed`, { method: 'POST' }).then(load);
      closeActionModal();
    });

    document.getElementById('ab-just').addEventListener('click', () => {
      if (!current) return;
      openUrl(current.url);
      closeActionModal();
    });

    document.getElementById('ab-cancel').addEventListener('click', closeActionModal);
  }


  document.getElementById('btn-copy').addEventListener('click', () => {
    if (!current) return;
    navigator.clipboard.writeText(current.url).then(() => {
      const btn = document.getElementById('btn-copy');
      btn.textContent = 'Copied!'; btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
    });
  });

  document.getElementById('action-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('action-overlay')) closeActionModal();
  });

  function closeActionModal() {
    document.getElementById('action-overlay').classList.remove('open');
    current = null;
  }

  /* ── add video modal ── */

  function updateAddBtn() {
    const url   = document.getElementById('add-url').value.trim();
    const title = document.getElementById('add-title').value.trim();
    document.getElementById('btn-add-submit').disabled = !(url && title);
  }

  document.getElementById('btn-show-add').addEventListener('click', () => {
    ['add-url','add-title','add-channel'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('add-emoji').value = '📺';
    document.getElementById('fetch-status').textContent = '';
    document.getElementById('fetch-status').className   = 'fetch-status';
    document.getElementById('btn-add-submit').disabled  = true;
    document.getElementById('btn-add-submit').textContent = 'Add to watchlist';
    document.getElementById('add-overlay').classList.add('open');
    setTimeout(() => document.getElementById('add-url').focus(), 100);
  });

  document.getElementById('add-url').addEventListener('input', () => {
    clearTimeout(fetchTimer);
    updateAddBtn();
    const url = document.getElementById('add-url').value.trim();
    if (!url) { setFetchStatus('', ''); return; }
    setFetchStatus('Fetching title…', '');
    fetchTimer = setTimeout(() => fetchPreview(url), 600);
  });

  // allow user to type title manually and enable the button
  document.getElementById('add-title').addEventListener('input', updateAddBtn);

  async function fetchPreview(url) {
    try {
      const res = await fetch(`/api/preview?url=${encodeURIComponent(url)}`);
      if (!res.ok) { setFetchStatus('Could not fetch title — enter it manually', 'err'); return; }
      const { title, channel_name } = await res.json();
      document.getElementById('add-title').value   = title        || '';
      document.getElementById('add-channel').value = channel_name || '';
      setFetchStatus(title ? 'Title fetched ✓' : 'No title returned — enter it manually',
                     title ? 'ok' : 'err');
      updateAddBtn();
    } catch {
      setFetchStatus('Could not fetch title — enter it manually', 'err');
    }
  }

  function setFetchStatus(msg, cls) {
    const el = document.getElementById('fetch-status');
    el.textContent = msg;
    el.className   = 'fetch-status' + (cls ? ' ' + cls : '');
  }

  document.getElementById('btn-add-submit').addEventListener('click', async () => {
    const url     = document.getElementById('add-url').value.trim();
    const title   = document.getElementById('add-title').value.trim();
    const channel = document.getElementById('add-channel').value.trim();
    const emoji   = document.getElementById('add-emoji').value.trim() || '📺';
    if (!url || !title) return;

    const btn = document.getElementById('btn-add-submit');
    btn.disabled = true; btn.textContent = 'Adding…';

    const res = await fetch('/api/videos', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, title, channel_name: channel, emoji }),
    });

    if (res.ok) {
      closeAddModal();
      load();
    } else {
      btn.disabled = false; btn.textContent = 'Add to watchlist';
      setFetchStatus('Error adding video — try again', 'err');
    }
  });

  document.getElementById('btn-add-cancel').addEventListener('click', closeAddModal);
  document.getElementById('add-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('add-overlay')) closeAddModal();
  });

  function closeAddModal() {
    document.getElementById('add-overlay').classList.remove('open');
  }

  /* ── summary overlay ── */

  function setCopyBtnsDisabled(disabled) {
    document.querySelectorAll('.btn-copy-opt').forEach(b => b.disabled = disabled);
  }

  async function openSummaryOverlay(video) {
    document.getElementById('summary-overlay-title').textContent = video.title;
    const contentEl = document.getElementById('summary-html-content');
    document.getElementById('summary-overlay').classList.add('open');

    if (video.summary) {
      contentEl.innerHTML = video.summary;
      setCopyBtnsDisabled(false);
      return;
    }

    contentEl.innerHTML = '<p style="color:#71717a;padding:8px 0">Fetching transcript and generating summary…</p>';
    setCopyBtnsDisabled(true);

    try {
      const res  = await fetch(`/api/videos/${video.id}/summary`, { method: 'POST' });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'failed');
      const cardBtn = document.querySelector(`.btn-card-summary[data-id="${video.id}"]`);
      if (cardBtn) cardBtn.dataset.summary = data.summary;
      const cardTitle = document.querySelector(`.card-title[data-id="${video.id}"]`);
      if (cardTitle) cardTitle.dataset.summary = data.summary;
      contentEl.innerHTML = data.summary;
      setCopyBtnsDisabled(false);
    } catch (err) {
      contentEl.innerHTML = `<p style="color:#f87171">Could not generate summary: ${err.message}</p>`;
      setCopyBtnsDisabled(false);
    }
  }

  function closeSummaryOverlay() {
    document.getElementById('summary-overlay').classList.remove('open');
  }

  document.getElementById('summary-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('summary-overlay')) closeSummaryOverlay();
  });
  document.getElementById('btn-summary-overlay-close').addEventListener('click', closeSummaryOverlay);
  function htmlToMarkdown(html) {
    const div = document.createElement('div');
    div.innerHTML = html;
    function toMd(node) {
      if (node.nodeType === Node.TEXT_NODE) return node.textContent;
      if (node.nodeType !== Node.ELEMENT_NODE) return '';
      const tag = node.tagName.toLowerCase();
      const inner = Array.from(node.childNodes).map(toMd).join('');
      switch (tag) {
        case 'h3': case 'h4': return `### ${inner}\n\n`;
        case 'p':  return `${inner}\n\n`;
        case 'ul': return Array.from(node.children).map(li => `- ${toMd(li).trim()}`).join('\n') + '\n\n';
        case 'ol': return Array.from(node.children).map((li, i) => `${i+1}. ${toMd(li).trim()}`).join('\n') + '\n\n';
        case 'li': return inner;
        case 'strong': case 'b': return `**${inner}**`;
        case 'em':     case 'i': return `*${inner}*`;
        default: return inner;
      }
    }
    return Array.from(div.childNodes).map(toMd).join('').trim();
  }

  function flashCopyBtn(btn, original) {
    btn.textContent = 'Copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = original; btn.classList.remove('copied'); }, 1500);
  }

  function copyText(text) {
    // Synchronous execCommand path first — required for iOS gesture context
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.setAttribute('readonly', '');
    ta.style.cssText = 'position:fixed;top:-9999px;left:0;width:2em;height:2em;opacity:0;';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    ta.setSelectionRange(0, text.length);
    let ok = false;
    try { ok = document.execCommand('copy'); } catch {}
    document.body.removeChild(ta);
    if (ok) return Promise.resolve();
    // Modern API fallback (works on desktop/HTTPS)
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(text).catch(() => Promise.resolve());
    }
    return Promise.resolve();
  }

  document.getElementById('btn-copy-plain').addEventListener('click', () => {
    const text = document.getElementById('summary-html-content').innerText;
    copyText(text).then(() => flashCopyBtn(document.getElementById('btn-copy-plain'), 'Plain text'));
  });
  document.getElementById('btn-copy-html').addEventListener('click', () => {
    const html = document.getElementById('summary-html-content').innerHTML;
    copyText(html).then(() => flashCopyBtn(document.getElementById('btn-copy-html'), 'HTML'));
  });
  document.getElementById('btn-copy-md').addEventListener('click', () => {
    const md = htmlToMarkdown(document.getElementById('summary-html-content').innerHTML);
    copyText(md).then(() => flashCopyBtn(document.getElementById('btn-copy-md'), 'Markdown'));
  });

  /* ── init ── */

  load();
  setInterval(load, 30000);
</script>
</body>
</html>
