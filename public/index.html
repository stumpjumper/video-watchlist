<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watchlist</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #18181b;
      color: #e4e4e7;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      min-height: 100vh;
      -webkit-text-size-adjust: 100%;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid #3f3f46;
    }

    h1 { font-size: 20px; font-weight: 600; color: #f4f4f5; }
    .count { color: #71717a; font-size: 14px; }

    /* ── Status badges ── */

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 99px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .badge-new     { background: #1e3a5f; color: #93c5fd; }
    .badge-started { background: #3b1f0a; color: #fb923c; }

    /* ── Video list ── */

    #list { list-style: none; }

    /* Mobile: 2-col grid — content left, delete right */
    .video-card {
      display: grid;
      grid-template-columns: 1fr 44px;
      grid-template-rows: auto auto auto;
      grid-template-areas:
        "channel del"
        "title   del"
        "badge   del";
      column-gap: 10px;
      row-gap: 3px;
      padding: 14px 0;
      border-bottom: 1px solid #27272a;
    }

    .video-card:last-child { border-bottom: none; }

    .card-channel {
      grid-area: channel;
      font-size: 13px;
      color: #a1a1aa;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      align-self: end;
    }

    .card-title {
      grid-area: title;
      color: #93c5fd;
      cursor: pointer;
      font-size: 16px;
      font-weight: 450;
      line-height: 1.35;
    }
    .card-title:active { color: #bfdbfe; }

    .card-badge {
      grid-area: badge;
      align-self: start;
      padding-top: 2px;
    }

    .card-del {
      grid-area: del;
      align-self: center;
      background: none;
      border: 1px solid #3f3f46;
      color: #f87171;
      width: 44px;
      height: 44px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.1s, border-color 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .card-del:active { background: #2d1f1f; border-color: #f87171; }

    /* ── Desktop: single-row table layout ── */

    @media (min-width: 600px) {
      .video-card {
        grid-template-columns: 170px 1fr 80px 96px 36px;
        grid-template-rows: auto;
        grid-template-areas: "channel title badge date del";
        align-items: center;
        column-gap: 14px;
        padding: 11px 0;
      }

      .card-title  { font-size: 15px; }
      .card-badge  { padding-top: 0; }

      .card-date {
        grid-area: date;
        font-size: 13px;
        color: #71717a;
        text-align: right;
        white-space: nowrap;
      }

      .card-del { width: 36px; height: 36px; font-size: 14px; border-radius: 6px; }

      .list-header {
        display: grid;
        grid-template-columns: 170px 1fr 80px 96px 36px;
        column-gap: 14px;
        padding: 0 0 10px;
        margin-bottom: 2px;
        border-bottom: 1px solid #3f3f46;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #71717a;
      }
    }

    @media (max-width: 599px) {
      .list-header { display: none; }
      .card-date   { display: none; }
    }

    /* ── Empty state ── */

    .empty {
      color: #52525b;
      text-align: center;
      padding: 64px 0;
      font-size: 16px;
    }

    /* ── Modal (bottom sheet on mobile, centered on desktop) ── */

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }
    .overlay.open { display: flex; }

    .modal {
      background: #27272a;
      border-top: 1px solid #3f3f46;
      border-radius: 16px 16px 0 0;
      padding: 20px 20px 36px;
      width: 100%;
    }

    @media (min-width: 600px) {
      .overlay { align-items: center; padding: 24px; }
      .modal   { border: 1px solid #3f3f46; border-radius: 12px; padding: 28px; max-width: 460px; }
    }

    .modal-handle {
      width: 40px; height: 4px;
      background: #52525b; border-radius: 2px;
      margin: 0 auto 20px;
    }
    @media (min-width: 600px) { .modal-handle { display: none; } }

    .modal-label {
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: #71717a; margin-bottom: 8px;
    }

    .modal-title {
      font-size: 17px; color: #f4f4f5;
      font-weight: 500; margin-bottom: 24px; line-height: 1.4;
    }

    .modal-actions { display: flex; flex-direction: column; gap: 10px; }

    .btn {
      border: none; padding: 15px 18px;
      border-radius: 10px; cursor: pointer;
      font-size: 16px; font-weight: 500;
      text-align: left; width: 100%;
      -webkit-tap-highlight-color: transparent;
      transition: filter 0.1s;
    }
    .btn:active { filter: brightness(0.85); }

    .btn-primary   { background: #2563eb; color: #fff; }
    .btn-orange    { background: #9a3412; color: #fed7aa; }
    .btn-secondary { background: #3f3f46; color: #e4e4e7; }
    .btn-cancel    { background: #27272a; color: #71717a; border: 1px solid #3f3f46; margin-top: 4px; }

    @media (min-width: 600px) {
      .btn { padding: 11px 16px; font-size: 14px; border-radius: 7px; }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>📺 Watchlist</h1>
    <span class="count" id="count"></span>
  </header>

  <div class="list-header" aria-hidden="true">
    <span>Channel</span>
    <span>Title</span>
    <span>Status</span>
    <span style="text-align:right">Added</span>
    <span></span>
  </div>

  <ul id="list"></ul>
  <div class="empty" id="empty" style="display:none">Nothing in the watchlist.</div>
</div>

<div class="overlay" id="overlay" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-label">Open video</div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<script>
  let current = null;

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function fmtDate(iso) {
    return new Date(iso).toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric' });
  }

  async function load() {
    const { videos } = await fetch('/api/videos').then(r => r.json());
    render(videos);
  }

  function render(videos) {
    const list  = document.getElementById('list');
    const empty = document.getElementById('empty');
    const count = document.getElementById('count');

    if (!videos.length) {
      list.innerHTML = '';
      empty.style.display = '';
      count.textContent = '';
      return;
    }

    empty.style.display = 'none';

    const nNew     = videos.filter(v => v.status === 'new').length;
    const nStarted = videos.filter(v => v.status === 'started').length;
    const parts = [];
    if (nNew)     parts.push(nNew     + ' new');
    if (nStarted) parts.push(nStarted + ' started');
    count.textContent = parts.join(', ');

    list.innerHTML = videos.map(v => {
      const badge = v.status === 'started'
        ? '<span class="badge badge-started">Started</span>'
        : '<span class="badge badge-new">New</span>';
      return `
        <li class="video-card">
          <span class="card-channel">${esc(v.emoji)} ${esc(v.channel_name)}</span>
          <span class="card-title"
            data-id="${v.id}"
            data-title="${esc(v.title)}"
            data-url="${esc(v.url)}"
            data-status="${esc(v.status)}"
            title="Tap to open">${esc(v.title)}</span>
          <span class="card-badge">${badge}</span>
          <span class="card-date">${fmtDate(v.added_at)}</span>
          <button class="card-del" data-id="${v.id}"
            aria-label="Remove from watchlist"
            title="Remove from watchlist">✕</button>
        </li>
      `;
    }).join('');
  }

  document.getElementById('list').addEventListener('click', e => {
    const titleEl = e.target.closest('.card-title');
    if (titleEl) {
      current = {
        id:     titleEl.dataset.id,
        title:  titleEl.dataset.title,
        url:    titleEl.dataset.url,
        status: titleEl.dataset.status,
      };
      document.getElementById('modal-title').textContent = current.title;
      buildModalActions(current.status);
      document.getElementById('overlay').classList.add('open');
      return;
    }
    const del = e.target.closest('.card-del');
    if (del) removeVideo(del.dataset.id);
  });

  function buildModalActions(status) {
    const el = document.getElementById('modal-actions');

    if (status === 'new') {
      el.innerHTML = `
        <button class="btn btn-primary" id="btn-started-open"
          title="Marks it as started so you remember you've tried it, but keeps it in the list">
          Mark as started &amp; open
        </button>
        <button class="btn btn-orange" id="btn-remove-open"
          title="Opens it and removes it from the list — use this when you know you'll finish it">
          Remove &amp; open
        </button>
        <button class="btn btn-secondary" id="btn-just-open"
          title="Opens without changing anything">
          Just open
        </button>
        <button class="btn btn-cancel" id="btn-cancel">Cancel</button>
      `;
    } else {
      // already started
      el.innerHTML = `
        <button class="btn btn-orange" id="btn-remove-open"
          title="Opens it and removes it from the list">
          Remove &amp; open
        </button>
        <button class="btn btn-secondary" id="btn-just-open"
          title="Opens without changing anything">
          Just open
        </button>
        <button class="btn btn-cancel" id="btn-cancel">Cancel</button>
      `;
    }

    document.getElementById('btn-remove-open').addEventListener('click', () => {
      if (!current) return;
      openUrl(current.url);                                          // sync — must be first
      fetch(`/api/videos/${current.id}`, { method: 'DELETE' }).then(load);
      closeModal();
    });

    document.getElementById('btn-just-open').addEventListener('click', () => {
      if (!current) return;
      openUrl(current.url);
      closeModal();
    });

    const startedBtn = document.getElementById('btn-started-open');
    if (startedBtn) {
      startedBtn.addEventListener('click', () => {
        if (!current) return;
        openUrl(current.url);                                        // sync — must be first
        fetch(`/api/videos/${current.id}/started`, { method: 'POST' }).then(load);
        closeModal();
      });
    }

    document.getElementById('btn-cancel').addEventListener('click', closeModal);
  }

  document.getElementById('overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('overlay')) closeModal();
  });

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
    current = null;
  }

  async function removeVideo(id) {
    await fetch(`/api/videos/${id}`, { method: 'DELETE' });
    load();
  }

  // Uses an <a> click instead of window.open so iOS Universal Links fire
  // and the YouTube app opens rather than Safari. On desktop this opens a new tab.
  function openUrl(url) {
    const a = document.createElement('a');
    a.href = url;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  load();
  setInterval(load, 30000);
</script>
</body>
</html>
