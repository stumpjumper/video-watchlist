<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Watchlist</title>
  <link rel="stylesheet" href="/shared.css">
  <style>
    /* ── SPA shell ── */
    html, body { height: 100%; }
    body {
      padding-bottom: calc(72px + env(safe-area-inset-bottom));
    }
    #view { min-height: 100%; }

    /* ── List view ── */
    .list-container { max-width: 860px; margin: 0 auto; padding: 24px 16px 16px; }

    .list-header-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 20px; padding-bottom: 16px;
      border-bottom: 1px solid var(--border); flex-wrap: wrap;
    }
    h1 { font-size: 20px; font-weight: 600; color: var(--text-head); flex-shrink: 0; }
    .count { color: var(--text-muted); font-size: 14px; flex: 1; min-width: 60px; }

    .add-btn             { color: var(--green); }
    .add-btn:hover       { border-color: var(--green); }
    .trash-btn           { position: relative; }
    .trash-btn.has-items { color: var(--red); border-color: var(--red-border); }
    .trash-btn.has-items:hover { border-color: var(--red); }
    .trash-btn.active    { border-color: var(--red); color: var(--red); }

    .filter-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .filter-search {
      flex: 1; background: var(--bg-surface); border: 1px solid var(--border); color: var(--text);
      padding: 8px 12px; border-radius: 8px; font-size: 14px;
      outline: none; -webkit-appearance: none; transition: border-color 0.15s;
    }
    .filter-search:focus                       { border-color: var(--accent); }
    .filter-search::placeholder                { color: var(--text-faint); }
    .filter-search::-webkit-search-cancel-button { display: none; }

    .label-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
    .label-chip {
      font-size: 11px; padding: 2px 7px; border-radius: 99px;
      background: var(--bg-raised); border: 1px solid var(--border); color: #a1a1aa;
      white-space: nowrap;
    }
    .label-chip-date { color: var(--text-faint); }

    #list { list-style: none; }

    .video-card {
      display: flex; flex-direction: column; gap: 4px;
      padding: 14px 16px; background: var(--bg-surface);
      border-radius: 12px; margin-bottom: 8px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: background 0.12s; user-select: none; -webkit-user-select: none;
    }
    .video-card:active { background: #26262a; }
    .card-channel {
      font-size: 12px; color: var(--text-muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-title   { color: var(--text-link); font-size: 16px; font-weight: 500; line-height: 1.35; }
    .card-footer  { display: flex; align-items: center; gap: 8px; margin-top: 2px; }
    .card-date    { font-size: 12px; color: var(--text-faint); margin-left: auto; }
    .card-trash-btn {
      background: none; border: none; padding: 4px 6px;
      color: var(--border); cursor: pointer; font-size: 15px; line-height: 1;
      border-radius: 4px; flex-shrink: 0;
      -webkit-tap-highlight-color: transparent; transition: color 0.12s;
    }
    .card-trash-btn:hover, .card-trash-btn:active { color: var(--red); }

    .bulk-bar {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      margin-bottom: 12px; padding: 10px 14px;
      background: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px;
    }
    .bulk-count { flex: 1; font-size: 13px; color: var(--text-muted); min-width: 60px; }
    .bulk-btn {
      background: none; border: 1px solid var(--border); color: #a1a1aa;
      padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 13px;
      white-space: nowrap; -webkit-tap-highlight-color: transparent;
      transition: border-color 0.12s, color 0.12s;
    }
    .bulk-btn:disabled { opacity: 0.35; cursor: default; }
    .bulk-btn.restore  { color: var(--green); border-color: #166534; }
    .bulk-btn.restore:not(:disabled):hover { background: var(--green-bg); border-color: var(--green); }
    .bulk-btn.del      { color: var(--red); border-color: var(--red-border); }
    .bulk-btn.del:not(:disabled):hover     { background: var(--red-bg); border-color: var(--red); }
    .bulk-btn.confirming { animation: pulse-border 0.3s ease; }
    @keyframes pulse-border { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

    .video-card.selectable { padding-left: 44px; position: relative; cursor: default; }
    .video-card.selectable::before {
      content: ''; position: absolute; left: 14px; top: 16px;
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid var(--border-mid); background: var(--bg-raised);
      transition: background 0.12s, border-color 0.12s;
    }
    .video-card.selectable.selected { background: #1a1a35; }
    .video-card.selectable.selected::before { background: #4338ca; border-color: var(--accent); }
    .video-card.selectable.selected::after {
      content: '✓'; position: absolute; left: 14px; top: 16px;
      width: 20px; height: 20px; font-size: 11px; font-weight: 700;
      color: #fff; text-align: center; line-height: 20px;
    }

    @media (min-width: 600px) {
      .video-card {
        display: grid;
        grid-template-columns: 160px 1fr 80px 96px 28px;
        grid-template-areas: "channel title badge date trash" ". chips chips chips chips";
        grid-template-rows: auto auto;
        gap: 0; column-gap: 16px; align-items: center;
        padding: 10px 14px; border-radius: 8px; margin-bottom: 4px;
        flex-direction: unset;
      }
      .card-channel   { grid-area: channel; font-size: 13px; align-self: center; }
      .card-title     { grid-area: title;   font-size: 15px; }
      .card-footer    { display: contents; }
      .card-badge     { grid-area: badge; }
      .card-date      { grid-area: date; text-align: right; margin-left: 0; font-size: 13px; color: var(--text-muted); }
      .card-trash-btn { grid-area: trash; padding: 2px 4px; }
      .card-chips-row { grid-area: chips; }

      .list-col-header {
        display: grid;
        grid-template-columns: 160px 1fr 80px 96px 28px;
        column-gap: 16px; padding: 0 14px 10px; margin-bottom: 4px;
        border-bottom: 1px solid var(--border);
        font-size: 11px; font-weight: 600;
        text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted);
      }
      .list-col-header span:last-child { text-align: right; }
      .video-card.selectable::before,
      .video-card.selectable::after { top: 50%; transform: translateY(-50%); }
    }
    @media (max-width: 599px) {
      .list-col-header { display: none; }
      .card-chips-row  { margin-top: 2px; }
    }

    .category-select {
      background: var(--bg-surface); border: 1px solid var(--border); color: #a1a1aa;
      padding: 8px 12px; border-radius: 8px; font-size: 13px;
      outline: none; cursor: pointer; -webkit-appearance: none; appearance: none;
      transition: border-color 0.15s, color 0.15s; flex-shrink: 0; max-width: 160px;
    }
    .category-select:focus  { border-color: var(--accent); color: var(--text); }
    .category-select.active { border-color: var(--accent); color: var(--accent-muted); }

    .sort-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .sort-label  { font-size: 12px; color: var(--text-faint); white-space: nowrap; }
    .sort-select {
      background: var(--bg-surface); border: 1px solid var(--border); color: #a1a1aa;
      padding: 5px 10px; border-radius: 6px; font-size: 13px;
      outline: none; cursor: pointer; -webkit-appearance: none; appearance: none;
      transition: border-color 0.15s, color 0.15s;
    }
    .sort-select:focus { border-color: var(--border-mid); color: var(--text); }
    .sort-dir {
      background: none; border: 1px solid var(--border); color: var(--text-muted);
      width: 32px; height: 30px; border-radius: 6px; cursor: pointer;
      font-size: 15px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: color 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .sort-dir:active { color: var(--text); border-color: var(--border-mid); }
    .sort-dir.asc    { color: var(--accent-muted); border-color: var(--accent); }

    .empty { color: var(--text-faint); text-align: center; padding: 64px 0; font-size: 16px; }

    .modal-url-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 16px;
      padding: 8px 10px; background: var(--bg-base);
      border-radius: 6px; border: 1px solid var(--border);
    }
    .modal-url {
      flex: 1; font-size: 12px; color: var(--text-muted);
      font-family: ui-monospace, monospace;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0;
    }
    .btn-copy {
      background: none; border: 1px solid var(--border); color: #a1a1aa;
      padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;
      white-space: nowrap; flex-shrink: 0; transition: color 0.1s, border-color 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-copy.copied { color: var(--green); border-color: var(--green); }

    .filter-modal-body { margin: 12px 0; }
    .filter-section-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 8px; margin-top: 16px;
    }
    .filter-section-label:first-child { margin-top: 0; }
    .filter-label-list { display: flex; flex-direction: column; gap: 6px; }
    .filter-label-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; background: var(--bg-surface); border-radius: 8px;
      border: 1px solid var(--border); cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .filter-label-item.selected { border-color: var(--accent); background: var(--accent-bg); }
    .filter-label-name  { font-size: 14px; color: var(--text); flex: 1; }
    .filter-mode-row    { display: flex; gap: 8px; margin-top: 10px; }
    .filter-mode-btn {
      flex: 1; padding: 8px; border-radius: 7px; cursor: pointer;
      font-size: 13px; font-weight: 500; text-align: center;
      background: var(--bg-surface); border: 1px solid var(--border); color: var(--text-muted);
      -webkit-tap-highlight-color: transparent;
    }
    .filter-mode-btn.active { border-color: var(--accent); color: var(--accent-muted); background: var(--accent-bg); }
    .filter-date-row { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
    .filter-date-row input[type="date"] {
      flex: 1; background: var(--bg-surface); border: 1px solid var(--border); color: var(--text);
      padding: 8px 10px; border-radius: 7px; font-size: 13px; outline: none;
      -webkit-appearance: none; color-scheme: dark;
    }
    .filter-date-sep { font-size: 12px; color: var(--text-faint); }
    .filter-actions  { display: flex; gap: 8px; margin-top: 16px; }
    .filter-actions .btn { flex: 1; text-align: center; }

    .labels-list { display: flex; flex-direction: column; gap: 6px; margin: 12px 0; }
    .labels-list-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; background: var(--bg-surface);
      border-radius: 8px; border: 1px solid var(--border);
    }
    .labels-list-name  { flex: 1; font-size: 15px; color: var(--text); }
    .btn-del-label {
      background: none; border: none; color: var(--text-faint); cursor: pointer;
      font-size: 16px; padding: 2px 6px; border-radius: 4px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-del-label:hover     { color: var(--red); }
    .btn-del-label[disabled] { opacity: 0.3; cursor: default; }
    .new-label-row { display: flex; gap: 8px; margin-top: 4px; }
    .new-label-row input { flex: 1; padding: 8px 10px; font-size: 14px; }
    .btn-add-label {
      background: var(--green-bg); border: 1px solid var(--green-border); color: var(--green);
      padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 14px;
      white-space: nowrap; -webkit-tap-highlight-color: transparent;
    }
    .btn-add-label:disabled { opacity: 0.4; cursor: default; }

    .field       { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .field label { font-size: 12px; color: #a1a1aa; font-weight: 500; }
    .field-row   { display: flex; gap: 8px; }
    .field-row .field       { flex: 1; margin-bottom: 0; }
    .field-row .field-emoji { flex: 0 0 72px; }

    input[type="text"], input[type="url"] {
      background: var(--bg-base); border: 1px solid var(--border);
      color: var(--text); padding: 10px 12px; border-radius: 8px;
      font-size: 15px; width: 100%; outline: none;
      transition: border-color 0.15s; -webkit-appearance: none;
    }
    input:focus        { border-color: var(--accent); }
    input::placeholder { color: var(--text-faint); }

    .fetch-status     { font-size: 12px; color: var(--text-muted); min-height: 16px; margin-top: -8px; }
    .fetch-status.ok  { color: var(--green); }
    .fetch-status.err { color: var(--red); }

    .summary-modal { display: flex; flex-direction: column; max-height: 85vh; }
    @media (min-width: 600px) { .summary-modal { max-height: 80vh; } }
    .summary-html {
      flex: 1; min-height: 0;
      background: var(--bg-inset); border: 1px solid var(--border); border-radius: 8px;
      padding: 16px 18px; margin: 12px 0 16px;
      overflow-y: auto; -webkit-overflow-scrolling: touch;
      font-size: 14px; line-height: 1.6; color: #d4d4d8;
    }
    .summary-html h3 {
      color: var(--text-head); font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.07em; margin: 14px 0 6px;
    }
    .summary-html h3:first-child { margin-top: 0; }
    .summary-html p                    { margin-bottom: 10px; }
    .summary-html ul, .summary-html ol { padding-left: 18px; margin-bottom: 10px; }
    .summary-html li                   { margin-bottom: 5px; }
    .summary-html strong               { color: var(--text); }

    .copy-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .btn-copy-opt {
      flex: 1; background: var(--border); border: 1px solid var(--border-mid);
      color: #a1a1aa; padding: 9px 0; border-radius: 7px; cursor: pointer; font-size: 13px;
      -webkit-tap-highlight-color: transparent; transition: background 0.1s;
    }
    .btn-copy-opt:active   { background: var(--border-mid); }
    .btn-copy-opt.copied   { color: var(--green); border-color: var(--green); }
    .btn-copy-opt:disabled { opacity: 0.4; cursor: default; }

    /* ── Reader view ── */
    .reader-container { max-width: 700px; margin: 0 auto; padding: 20px 16px 32px; }

    .btn-back {
      display: inline-flex; align-items: center; gap: 4px;
      background: none; border: none; color: var(--text-muted); cursor: pointer;
      font-size: 14px; padding: 4px 0; margin-bottom: 20px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-back:active { color: var(--text); }

    .reader-header { margin-bottom: 24px; }
    .reader-channel {
      font-size: 12px; color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.06em; font-weight: 600; display: block; margin-bottom: 8px;
    }
    .reader-title {
      font-size: 22px; font-weight: 600; color: var(--text-head);
      line-height: 1.3; margin-bottom: 10px;
    }
    .reader-meta {
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; color: var(--text-muted);
    }
    .reader-label-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }

    .reader-audio-zone {
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px; margin-bottom: 24px;
    }
    .reader-audio-hint {
      font-size: 13px; color: var(--text-muted); margin-bottom: 10px;
    }
    .reader-audio-status {
      font-size: 13px; color: var(--text-muted); text-align: center; padding: 8px 0;
    }
    .reader-audio-status.generating { color: var(--orange); }
    .reader-audio-status.failed     { color: var(--red); }
    .reader-audio-status.ready      { color: var(--green); }

    .article-text {
      font-size: 16px; line-height: 1.75; color: var(--text);
      white-space: pre-wrap; word-wrap: break-word;
    }
    .article-text-empty {
      color: var(--text-faint); font-size: 14px;
      text-align: center; padding: 40px 0;
    }
    .article-text-empty p { margin-bottom: 16px; }

    /* ── Mini-player — frosted glass ── */
    #mini-player {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
      background: rgba(18, 18, 20, 0.88);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-bottom: env(safe-area-inset-bottom);
    }

    .mp-progress-track {
      height: 2px; background: rgba(255,255,255,0.07);
      position: relative; cursor: pointer;
    }
    .mp-progress-fill {
      height: 100%; background: var(--accent);
      width: 0%; will-change: width;
    }

    .mp-inner {
      display: flex; align-items: center;
      padding: 0 8px 0 12px; height: 64px; gap: 2px;
    }
    .mp-info {
      flex: 1; min-width: 0; overflow: hidden;
      cursor: pointer; padding: 4px 8px 4px 0;
    }
    .mp-title {
      display: block; font-size: 13px; font-weight: 500; color: var(--text-head);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3;
    }
    .mp-channel {
      display: block; font-size: 11px; color: var(--text-muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px;
    }

    .mp-btn {
      background: none; border: none; color: var(--text); cursor: pointer;
      min-width: 44px; min-height: 44px; font-size: 18px; line-height: 1;
      border-radius: 10px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent; transition: opacity 0.1s;
    }
    .mp-btn:active { opacity: 0.55; }
    .mp-btn:disabled { opacity: 0.25; }
    .mp-btn-play { font-size: 22px; color: var(--text-head); }
    .mp-btn-seek { font-size: 15px; color: var(--text-muted); }
    .mp-speed-badge {
      font-size: 10px; font-weight: 700; color: var(--text-muted);
      background: var(--bg-raised); border: 1px solid var(--border);
      padding: 2px 5px; border-radius: 4px; line-height: 1;
      flex-shrink: 0; white-space: nowrap;
    }

    @media (min-width: 600px) {
      .mp-inner { padding: 0 16px 0 20px; }
    }
  </style>
</head>
<body>

<div id="view"></div>

<!-- Mini-player (persistent — never removed from DOM) -->
<div id="mini-player">
  <div class="mp-progress-track" id="mp-progress-track">
    <div class="mp-progress-fill" id="mp-progress"></div>
  </div>
  <div class="mp-inner">
    <div class="mp-info" id="mp-info" title="Open reader">
      <span class="mp-title" id="mp-title">Nothing playing</span>
      <span class="mp-channel" id="mp-channel"></span>
    </div>
    <span class="mp-speed-badge" id="mp-speed-badge" style="display:none"></span>
    <button class="mp-btn mp-btn-seek" id="mp-seek-back" title="Back 10s" disabled>↩︎</button>
    <button class="mp-btn mp-btn-play" id="mp-play-pause" title="Play / Pause" disabled>▶</button>
    <button class="mp-btn mp-btn-seek" id="mp-next-btn" title="Next" disabled>⏭</button>
  </div>
</div>

<!-- Action modal -->
<div class="overlay" id="action-overlay" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-label" id="action-modal-label">Open</div>
    <div class="modal-title" id="action-title"></div>
    <div class="modal-url-row" id="action-url-row">
      <span class="modal-url" id="action-url"></span>
      <button class="btn-copy" id="btn-copy-url">Copy</button>
    </div>
    <div class="modal-actions" id="action-btns"></div>
  </div>
</div>

<!-- Filter modal -->
<div class="overlay" id="filter-overlay" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-label">Filter</div>
    <div class="filter-modal-body">
      <div class="filter-section-label">Labels</div>
      <div class="filter-label-list" id="filter-label-list"></div>
      <div class="filter-mode-row" id="filter-mode-row" style="display:none">
        <button class="filter-mode-btn active" data-mode="or"  id="fmode-or">Any label (OR)</button>
        <button class="filter-mode-btn"        data-mode="and" id="fmode-and">All labels (AND)</button>
      </div>
      <div class="filter-section-label">Date added</div>
      <div class="filter-date-row">
        <input type="date" id="filter-after"  placeholder="From">
        <span class="filter-date-sep">–</span>
        <input type="date" id="filter-before" placeholder="To">
      </div>
    </div>
    <div class="filter-actions">
      <button class="btn btn-cancel"    id="btn-filter-cancel">Cancel</button>
      <button class="btn btn-secondary" id="btn-filter-clear">Clear</button>
      <button class="btn btn-indigo"    id="btn-filter-apply">Apply</button>
    </div>
  </div>
</div>

<!-- Labels management modal -->
<div class="overlay" id="labels-overlay" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-label">Labels</div>
    <div class="labels-list" id="labels-list"></div>
    <div class="new-label-row">
      <input type="text" id="new-label-input" placeholder="New label name…" maxlength="40">
      <button class="btn-add-label" id="btn-create-label" disabled>Add</button>
    </div>
    <div class="modal-actions" style="margin-top:16px">
      <button class="btn btn-cancel" id="btn-labels-close">Done</button>
    </div>
  </div>
</div>

<!-- Add video modal -->
<div class="overlay" id="add-overlay" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-label" id="add-modal-label">Add to watchlist</div>

    <div class="field">
      <label for="add-url">URL</label>
      <input type="url" id="add-url" placeholder="https://www.youtube.com/watch?v=… or article URL"
        autocomplete="off" autocorrect="off" spellcheck="false">
      <span class="fetch-status" id="fetch-status"></span>
    </div>

    <div class="field-row">
      <div class="field">
        <label for="add-title">Title</label>
        <input type="text" id="add-title" placeholder="Title">
      </div>
      <div class="field field-emoji">
        <label for="add-emoji">Emoji</label>
        <input type="text" id="add-emoji" placeholder="📺" value="📺">
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label for="add-channel">Channel / Source</label>
        <input type="text" id="add-channel" placeholder="Channel or source name">
      </div>
      <div class="field" style="flex:0 0 140px">
        <label for="add-category">Category</label>
        <select id="add-category" class="category-select" style="max-width:100%;width:100%;padding:10px 10px">
          <option value="youtube">YouTube</option>
          <option value="ars_technica">Ars Technica</option>
        </select>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-green" id="btn-add-submit" disabled>Add to watchlist</button>
      <button class="btn btn-cancel" id="btn-add-cancel">Cancel</button>
    </div>
  </div>
</div>

<!-- Summary overlay -->
<div class="overlay" id="summary-overlay" role="dialog" aria-modal="true">
  <div class="modal summary-modal">
    <div class="modal-handle"></div>
    <div class="modal-label">Summary</div>
    <div class="modal-title" id="summary-overlay-title"></div>
    <div class="summary-html" id="summary-html-content"></div>
    <div class="modal-actions">
      <div class="copy-row">
        <button class="btn-copy-opt" id="btn-copy-plain">Plain text</button>
        <button class="btn-copy-opt" id="btn-copy-html">HTML</button>
        <button class="btn-copy-opt" id="btn-copy-md">Markdown</button>
      </div>
      <button class="btn btn-secondary" id="btn-summary-overlay-close">Close</button>
    </div>
  </div>
</div>

<script src="/player.js"></script>
<script src="/app.js"></script>
</body>
</html>
