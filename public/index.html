<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watchlist</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #18181b;
      color: #e4e4e7;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      min-height: 100vh;
      -webkit-text-size-adjust: 100%;
    }

    .container { max-width: 860px; margin: 0 auto; padding: 24px 16px 64px; }

    /* ── Header ── */

    header {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 20px; padding-bottom: 16px;
      border-bottom: 1px solid #3f3f46; flex-wrap: wrap;
    }
    h1 { font-size: 20px; font-weight: 600; color: #f4f4f5; flex-shrink: 0; }
    .count { color: #71717a; font-size: 14px; flex: 1; min-width: 60px; }

    .hdr-btn {
      background: none; border: 1px solid #3f3f46; color: #a1a1aa;
      padding: 5px 12px; border-radius: 6px; cursor: pointer;
      font-size: 13px; white-space: nowrap;
      transition: border-color 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .hdr-btn:hover         { border-color: #71717a; color: #e4e4e7; }
    .hdr-btn.active        { border-color: #6366f1; color: #a5b4fc; }
    .hdr-btn.add-btn       { color: #4ade80; }
    .hdr-btn.add-btn:hover { border-color: #4ade80; }
    .hdr-btn.trash-btn     { position: relative; }
    .hdr-btn.trash-btn.has-items { color: #f87171; border-color: #7f1d1d; }
    .hdr-btn.trash-btn.has-items:hover { border-color: #f87171; }
    .hdr-btn.trash-btn.active { border-color: #f87171; color: #f87171; }

    /* ── Filter row ── */

    .filter-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 10px;
    }
    .filter-search {
      flex: 1;
      background: #1c1c1f; border: 1px solid #3f3f46; color: #e4e4e7;
      padding: 8px 12px; border-radius: 8px; font-size: 14px;
      outline: none; -webkit-appearance: none;
      transition: border-color 0.15s;
    }
    .filter-search:focus { border-color: #6366f1; }
    .filter-search::placeholder { color: #52525b; }
    .filter-search::-webkit-search-cancel-button { display: none; }

    .btn-filter {
      background: none; border: 1px solid #3f3f46; color: #a1a1aa;
      padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 13px;
      white-space: nowrap; transition: border-color 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent; flex-shrink: 0;
    }
    .btn-filter:hover  { border-color: #71717a; color: #e4e4e7; }
    .btn-filter.active { border-color: #6366f1; color: #a5b4fc; }

    /* ── Badges ── */

    .badge {
      display: inline-block; font-size: 11px; font-weight: 700;
      padding: 2px 8px; border-radius: 99px;
      text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap;
    }
    .badge-new      { background: #1e3a5f; color: #93c5fd; }
    .badge-started  { background: #3b1f0a; color: #fb923c; }
    .badge-finished { background: #14291a; color: #4ade80; }

    /* ── Label chips ── */

    .label-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
    .label-chip {
      font-size: 11px; padding: 2px 7px; border-radius: 99px;
      background: #27272a; border: 1px solid #3f3f46; color: #a1a1aa;
      white-space: nowrap;
    }
    .label-chip-date { color: #52525b; }

    /* ── Active list ── */

    #list { list-style: none; }

    .video-card {
      display: flex; flex-direction: column; gap: 4px;
      padding: 14px 16px; background: #1c1c1f;
      border-radius: 12px; margin-bottom: 8px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: background 0.12s; user-select: none; -webkit-user-select: none;
    }
    .video-card:active { background: #26262a; }

    .card-channel {
      font-size: 12px; color: #71717a;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-title {
      color: #93c5fd; font-size: 16px; font-weight: 500; line-height: 1.35;
    }
    .card-footer {
      display: flex; align-items: center; gap: 8px; margin-top: 2px;
    }
    .card-badge { /* inherits from .badge */ }
    .card-date  { font-size: 12px; color: #52525b; margin-left: auto; }
    .card-trash-btn {
      background: none; border: none; padding: 4px 6px;
      color: #3f3f46; cursor: pointer; font-size: 15px; line-height: 1;
      border-radius: 4px; flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.12s;
    }
    .card-trash-btn:hover  { color: #f87171; }
    .card-trash-btn:active { color: #f87171; }

    /* ── Bulk action bar (trash mode) ── */

    .bulk-bar {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      margin-bottom: 12px; padding: 10px 14px;
      background: #1c1c1f; border: 1px solid #3f3f46; border-radius: 8px;
    }
    .bulk-count { flex: 1; font-size: 13px; color: #71717a; min-width: 60px; }
    .bulk-btn {
      background: none; border: 1px solid #3f3f46; color: #a1a1aa;
      padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 13px;
      white-space: nowrap; -webkit-tap-highlight-color: transparent;
      transition: border-color 0.12s, color 0.12s;
    }
    .bulk-btn:disabled { opacity: 0.35; cursor: default; }
    .bulk-btn.sel-all  { }
    .bulk-btn.sel-all:not(:disabled):hover { border-color: #71717a; color: #e4e4e7; }
    .bulk-btn.restore  { color: #4ade80; border-color: #166534; }
    .bulk-btn.restore:not(:disabled):hover  { background: #14291e; border-color: #4ade80; }
    .bulk-btn.del      { color: #f87171; border-color: #7f1d1d; }
    .bulk-btn.del:not(:disabled):hover      { background: #2d1f1f; border-color: #f87171; }
    .bulk-btn.confirming { animation: pulse-border 0.3s ease; }

    @keyframes pulse-border { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

    /* ── Selectable cards (trash mode) ── */

    .video-card.selectable { padding-left: 44px; position: relative; cursor: default; }
    .video-card.selectable::before {
      content: '';
      position: absolute; left: 14px; top: 16px;
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid #52525b; background: #27272a;
      transition: background 0.12s, border-color 0.12s;
    }
    .video-card.selectable.selected { background: #1a1a35; }
    .video-card.selectable.selected::before { background: #4338ca; border-color: #6366f1; }
    .video-card.selectable.selected::after {
      content: '✓';
      position: absolute; left: 14px; top: 16px;
      width: 20px; height: 20px;
      font-size: 11px; font-weight: 700; color: #fff;
      text-align: center; line-height: 20px;
    }

    /* ── Desktop layout ── */

    @media (min-width: 600px) {
      .video-card {
        display: grid;
        grid-template-columns: 160px 1fr 80px 96px 28px;
        grid-template-areas: "channel title badge date trash" ". chips chips chips chips";
        grid-template-rows: auto auto;
        gap: 0; column-gap: 16px;
        align-items: center;
        padding: 10px 14px;
        border-radius: 8px;
        margin-bottom: 4px;
        flex-direction: unset;
      }
      .card-channel   { grid-area: channel;  font-size: 13px; align-self: center; }
      .card-title     { grid-area: title;    font-size: 15px; }
      .card-footer    { display: contents; }
      .card-badge     { grid-area: badge; }
      .card-date      { grid-area: date; text-align: right; margin-left: 0; font-size: 13px; color: #71717a; }
      .card-trash-btn { grid-area: trash; padding: 2px 4px; }
      .card-chips-row { grid-area: chips; }

      .list-header {
        display: grid;
        grid-template-columns: 160px 1fr 80px 96px 28px;
        column-gap: 16px; padding: 0 14px 10px; margin-bottom: 4px;
        border-bottom: 1px solid #3f3f46;
        font-size: 11px; font-weight: 600;
        text-transform: uppercase; letter-spacing: 0.06em; color: #71717a;
      }
      .list-header span:last-child { text-align: right; }

      .video-card.selectable::before,
      .video-card.selectable::after { top: 50%; transform: translateY(-50%); }

      .summary-modal { max-width: 640px; }
    }

    @media (max-width: 599px) {
      .list-header { display: none; }
      .card-chips-row { margin-top: 2px; }
    }

    /* ── Category filter ── */

    .category-select {
      background: #1c1c1f; border: 1px solid #3f3f46; color: #a1a1aa;
      padding: 8px 12px; border-radius: 8px; font-size: 13px;
      outline: none; cursor: pointer;
      -webkit-appearance: none; appearance: none;
      transition: border-color 0.15s, color 0.15s;
      flex-shrink: 0;
      max-width: 160px;
    }
    .category-select:focus { border-color: #6366f1; color: #e4e4e7; }
    .category-select.active { border-color: #6366f1; color: #a5b4fc; }

    /* ── Article card action buttons ── */
    .card-article-actions {
      display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px;
    }
    .card-action-btn {
      background: none; border: 1px solid #3f3f46; color: #a1a1aa;
      padding: 5px 10px; border-radius: 6px; cursor: pointer;
      font-size: 12px; white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.15s, color 0.15s;
      text-decoration: none; display: inline-block;
    }
    .card-action-btn:hover { border-color: #71717a; color: #e4e4e7; }
    .card-action-btn.open-article { color: #93c5fd; border-color: #1e3a5f; }
    .card-action-btn.open-article:hover { border-color: #3b82f6; }
    .card-action-btn.listen { color: #a5b4fc; border-color: #312e81; }
    .card-action-btn.listen:hover { border-color: #6366f1; }

    /* ── Sort row ── */

    .sort-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 14px;
    }
    .sort-label { font-size: 12px; color: #52525b; white-space: nowrap; }
    .sort-select {
      background: #1c1c1f; border: 1px solid #3f3f46; color: #a1a1aa;
      padding: 5px 10px; border-radius: 6px; font-size: 13px;
      outline: none; cursor: pointer;
      -webkit-appearance: none; appearance: none;
      transition: border-color 0.15s, color 0.15s;
    }
    .sort-select:focus { border-color: #71717a; color: #e4e4e7; }
    .sort-dir {
      background: none; border: 1px solid #3f3f46; color: #71717a;
      width: 32px; height: 30px; border-radius: 6px; cursor: pointer;
      font-size: 15px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: color 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .sort-dir:active { color: #e4e4e7; border-color: #71717a; }
    .sort-dir.desc   { color: #a1a1aa; }
    .sort-dir.asc    { color: #a5b4fc; border-color: #6366f1; }

    /* ── Empty ── */

    .empty { color: #52525b; text-align: center; padding: 64px 0; font-size: 16px; }

    /* ── Modals ── */

    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 100;
      align-items: flex-end; justify-content: center;
    }
    .overlay.open { display: flex; }

    .modal {
      background: #27272a; border-top: 1px solid #3f3f46;
      border-radius: 16px 16px 0 0; padding: 20px 20px 36px; width: 100%;
    }

    @media (min-width: 600px) {
      .overlay { align-items: center; padding: 24px; }
      .modal { border: 1px solid #3f3f46; border-radius: 12px; padding: 28px; max-width: 480px; }
    }

    .modal-handle {
      width: 40px; height: 4px; background: #52525b;
      border-radius: 2px; margin: 0 auto 20px;
    }
    @media (min-width: 600px) { .modal-handle { display: none; } }

    .modal-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; color: #71717a; margin-bottom: 8px;
    }
    .modal-title {
      font-size: 17px; color: #f4f4f5; font-weight: 500;
      margin-bottom: 10px; line-height: 1.4;
    }
    .modal-url-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 16px;
      padding: 8px 10px; background: #18181b;
      border-radius: 6px; border: 1px solid #3f3f46;
    }
    .modal-url {
      flex: 1; font-size: 12px; color: #71717a;
      font-family: ui-monospace, monospace;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0;
    }
    .btn-copy {
      background: none; border: 1px solid #3f3f46; color: #a1a1aa;
      padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;
      white-space: nowrap; flex-shrink: 0; transition: color 0.1s, border-color 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-copy.copied { color: #4ade80; border-color: #4ade80; }

    .modal-actions { display: flex; flex-direction: column; gap: 10px; }
    .modal-divider { height: 1px; background: #3f3f46; margin: 2px 0; }

    /* ── Label picker (archive sub-state) ── */

    .label-picker { display: flex; flex-direction: column; gap: 8px; margin: 12px 0 4px; }
    .label-picker-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; background: #1c1c1f; border-radius: 8px;
      border: 1px solid #3f3f46; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.12s;
    }
    .label-picker-item.selected { border-color: #6366f1; background: #1e1e3f; }
    .label-picker-item input[type="checkbox"] { display: none; }
    .label-picker-check {
      width: 18px; height: 18px; border-radius: 4px;
      border: 1px solid #3f3f46; background: #18181b;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 12px; color: #a5b4fc;
      transition: border-color 0.12s, background 0.12s;
    }
    .label-picker-item.selected .label-picker-check {
      border-color: #6366f1; background: #3730a3;
    }
    .label-picker-name  { font-size: 15px; color: #e4e4e7; flex: 1; }
    .label-picker-since { font-size: 11px; color: #52525b; white-space: nowrap; }

    /* ── Add modal fields ── */

    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .field label { font-size: 12px; color: #a1a1aa; font-weight: 500; }
    .field-row { display: flex; gap: 8px; }
    .field-row .field { flex: 1; margin-bottom: 0; }
    .field-row .field-emoji { flex: 0 0 72px; }

    input[type="text"], input[type="url"] {
      background: #18181b; border: 1px solid #3f3f46;
      color: #e4e4e7; padding: 10px 12px; border-radius: 8px;
      font-size: 15px; width: 100%; outline: none;
      transition: border-color 0.15s; -webkit-appearance: none;
    }
    input:focus { border-color: #6366f1; }
    input::placeholder { color: #52525b; }

    .fetch-status { font-size: 12px; color: #71717a; min-height: 16px; margin-top: -8px; }
    .fetch-status.ok  { color: #4ade80; }
    .fetch-status.err { color: #f87171; }

    .btn {
      border: none; padding: 15px 18px; border-radius: 10px; cursor: pointer;
      font-size: 16px; font-weight: 500; text-align: left; width: 100%;
      -webkit-tap-highlight-color: transparent; transition: filter 0.1s;
    }
    .btn:active   { filter: brightness(0.85); }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn-primary   { background: #1e3154; border: 1px solid #3b82f6; color: #93c5fd; }
    .btn-green     { background: #14291e; border: 1px solid #16a34a; color: #4ade80; }
    .btn-orange    { background: #2c1a09; border: 1px solid #c2410c; color: #fb923c; }
    .btn-secondary { background: #3f3f46; color: #e4e4e7; border: none; }
    .btn-muted     { background: none; border: 1px solid #3f3f46; color: #71717a; }
    .btn-danger    { background: none; border: 1px solid #3f3f46; color: #f87171; }
    .btn-danger:active { background: #2d1f1f; border-color: #f87171; }
    .btn-cancel    { background: #27272a; color: #71717a; border: 1px solid #3f3f46; }
    .btn-indigo    { background: #1e1e3f; border: 1px solid #6366f1; color: #a5b4fc; }

    @media (min-width: 600px) {
      .btn { padding: 11px 16px; font-size: 14px; border-radius: 7px; }
    }

    /* ── Filter modal ── */

    .filter-modal-body { margin: 12px 0; }
    .filter-section-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; color: #71717a; margin-bottom: 8px; margin-top: 16px;
    }
    .filter-section-label:first-child { margin-top: 0; }
    .filter-label-list { display: flex; flex-direction: column; gap: 6px; }
    .filter-label-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; background: #1c1c1f; border-radius: 8px;
      border: 1px solid #3f3f46; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .filter-label-item.selected { border-color: #6366f1; background: #1e1e3f; }
    .filter-label-item .label-picker-check { /* reuse */ }
    .filter-label-name { font-size: 14px; color: #e4e4e7; flex: 1; }
    .filter-mode-row {
      display: flex; gap: 8px; margin-top: 10px;
    }
    .filter-mode-btn {
      flex: 1; padding: 8px; border-radius: 7px; cursor: pointer;
      font-size: 13px; font-weight: 500; text-align: center;
      background: #1c1c1f; border: 1px solid #3f3f46; color: #71717a;
      -webkit-tap-highlight-color: transparent;
    }
    .filter-mode-btn.active { border-color: #6366f1; color: #a5b4fc; background: #1e1e3f; }
    .filter-date-row { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
    .filter-date-row input[type="date"] {
      flex: 1; background: #1c1c1f; border: 1px solid #3f3f46; color: #e4e4e7;
      padding: 8px 10px; border-radius: 7px; font-size: 13px; outline: none;
      -webkit-appearance: none; color-scheme: dark;
    }
    .filter-date-sep { font-size: 12px; color: #52525b; }
    .filter-actions { display: flex; gap: 8px; margin-top: 16px; }
    .filter-actions .btn { flex: 1; text-align: center; }

    /* ── Labels management modal ── */

    .labels-list { display: flex; flex-direction: column; gap: 6px; margin: 12px 0; }
    .labels-list-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; background: #1c1c1f; border-radius: 8px;
      border: 1px solid #3f3f46;
    }
    .labels-list-name { flex: 1; font-size: 15px; color: #e4e4e7; }
    .labels-list-count { font-size: 12px; color: #52525b; }
    .btn-del-label {
      background: none; border: none; color: #52525b; cursor: pointer;
      font-size: 16px; padding: 2px 6px; border-radius: 4px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-del-label:hover { color: #f87171; }
    .btn-del-label[disabled] { opacity: 0.3; cursor: default; }
    .new-label-row { display: flex; gap: 8px; margin-top: 4px; }
    .new-label-row input { flex: 1; padding: 8px 10px; font-size: 14px; }
    .btn-add-label {
      background: #14291e; border: 1px solid #16a34a; color: #4ade80;
      padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 14px;
      white-space: nowrap; -webkit-tap-highlight-color: transparent;
    }
    .btn-add-label:disabled { opacity: 0.4; cursor: default; }

    /* ── Summary overlay ── */

    .summary-modal {
      display: flex; flex-direction: column; max-height: 85vh;
    }
    @media (min-width: 600px) { .summary-modal { max-height: 80vh; } }

    .summary-html {
      flex: 1; min-height: 0;
      background: #1e1e21; border: 1px solid #3f3f46; border-radius: 8px;
      padding: 16px 18px; margin: 12px 0 16px;
      overflow-y: auto; -webkit-overflow-scrolling: touch;
      font-size: 14px; line-height: 1.6; color: #d4d4d8;
    }
    .summary-html h3 {
      color: #f4f4f5; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.07em; margin: 14px 0 6px;
    }
    .summary-html h3:first-child { margin-top: 0; }
    .summary-html p  { margin-bottom: 10px; }
    .summary-html ul, .summary-html ol { padding-left: 18px; margin-bottom: 10px; }
    .summary-html li { margin-bottom: 5px; }
    .summary-html strong { color: #e4e4e7; }

    .copy-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .btn-copy-opt {
      flex: 1; background: #3f3f46; border: 1px solid #52525b;
      color: #a1a1aa; padding: 9px 0; border-radius: 7px;
      cursor: pointer; font-size: 13px;
      -webkit-tap-highlight-color: transparent; transition: background 0.1s;
    }
    .btn-copy-opt:active  { background: #52525b; }
    .btn-copy-opt.copied  { color: #4ade80; border-color: #4ade80; }
    .btn-copy-opt:disabled { opacity: 0.4; cursor: default; }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>📺 Watchlist</h1>
    <span class="count" id="count"></span>
    <button class="hdr-btn" id="btn-labels">Labels</button>

<script>
  // ── State ──────────────────────────────────────────────────────────────────

  let current        = null;
  let fetchTimer     = null;
  let sortBy         = 'added_at';
  let sortDir        = 'desc';
  let allLabels      = [];
  let selectedIds    = new Set();
  let trashActive    = false;
  let activeCategory = '';   // source filter value

  function isTrashMode() { return trashActive; }

  // ── Category display names ─────────────────────────────────────────────────

  const CATEGORY_NAMES = {
    'youtube':      'YouTube',
    'ars_technica': 'Ars Technica',
  };

  function categoryDisplayName(source) {
    return CATEGORY_NAMES[source]
      ?? source.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  }

  // Active filter state
  let filterText    = '';
  let filterLabels  = [];       // array of label IDs
  let filterMode    = 'or';
  let filterAfter   = '';
  let filterBefore  = '';

  // ── Utils ──────────────────────────────────────────────────────────────────

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function fmtDate(iso) {
    return new Date(iso).toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric' });
  }

  function fmtDateShort(iso) {
    return new Date(iso).toLocaleDateString(undefined, { month:'short', day:'numeric' });
  }

  function openUrl(url) {
    const a = document.createElement('a');
    a.href = url; a.target = '_blank'; a.rel = 'noopener noreferrer';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }

  function copyText(text) {
    const ta = document.createElement('textarea');
    ta.value = text; ta.setAttribute('readonly', '');
    ta.style.cssText = 'position:fixed;top:-9999px;left:0;width:2em;height:2em;opacity:0;';
    document.body.appendChild(ta);
    ta.focus(); ta.select(); ta.setSelectionRange(0, text.length);
    let ok = false;
    try { ok = document.execCommand('copy'); } catch {}
    document.body.removeChild(ta);
    if (ok) return Promise.resolve();
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(text).catch(() => Promise.resolve());
    }
    return Promise.resolve();
  }

  // ── Labels ─────────────────────────────────────────────────────────────────

  async function loadLabels() {
    allLabels = await fetch('/api/labels').then(r => r.json());
  }

  function userLabels() {
    return allLabels.filter(l => l.id !== 1 && l.id !== 2);
  }

  // ── Sort ───────────────────────────────────────────────────────────────────

  function sortVideos(videos) {
    const statusOrder = { new: 0, started: 1 };
    return [...videos].sort((a, b) => {
      let va, vb;
      if (sortBy === 'added_at') {
        va = new Date(a.added_at).getTime();
        vb = new Date(b.added_at).getTime();
      } else if (sortBy === 'status') {
        va = statusOrder[a.status] ?? 9;
        vb = statusOrder[b.status] ?? 9;
      } else {
        va = (a[sortBy] || '').toLowerCase();
        vb = (b[sortBy] || '').toLowerCase();
      }
      if (va < vb) return sortDir === 'asc' ? -1 : 1;
      if (va > vb) return sortDir === 'asc' ?  1 : -1;
      return 0;
    });
  }

  document.getElementById('sort-field').addEventListener('change', e => {
    sortBy = e.target.value; load();
  });
  document.getElementById('sort-dir').addEventListener('click', () => {
    sortDir = sortDir === 'desc' ? 'asc' : 'desc';
    const btn = document.getElementById('sort-dir');
    btn.textContent = sortDir === 'asc' ? '↑' : '↓';
    btn.className   = `sort-dir ${sortDir}`;
    load();
  });

  // ── Load & render main list ─────────────────────────────────────────────────

  async function load() {
    const params = new URLSearchParams();
    if (filterText) params.set('q', filterText);
    const activeLabels = trashActive ? [2, ...filterLabels] : filterLabels;
    if (activeLabels.length) params.set('labels', activeLabels.join(','));
    if (activeLabels.length > 1) {
      // Trash is always AND'd so it stays required regardless of the user's OR/AND setting
      params.set('label_mode', trashActive ? 'and' : filterMode);
    }
    if (filterAfter)  params.set('after',  filterAfter);
    if (filterBefore) params.set('before', filterBefore);
    if (activeCategory) params.set('source', activeCategory);

    const data = await fetch('/api/videos?' + params).then(r => r.json());
    render(data.videos);
    updateTrashBtn(data.trash_count || 0);
  }

  function render(videos) {
    const list  = document.getElementById('list');
    const empty = document.getElementById('empty');
    const count = document.getElementById('count');

    if (!videos.length) {
      list.innerHTML = ''; empty.style.display = ''; count.textContent = ''; return;
    }
    empty.style.display = 'none';
    const nNew      = videos.filter(v => v.status === 'new').length;
    const nStarted  = videos.filter(v => v.status === 'started').length;
    const nFinished = videos.filter(v => v.status === 'finished').length;
    count.textContent = [nNew && nNew+' new', nStarted && nStarted+' started', nFinished && nFinished+' finished'].filter(Boolean).join(', ');

    const trash = isTrashMode();
    list.innerHTML = sortVideos(videos).map(v => {
      const isArticle = v.content_type === 'article';
      const badge = v.status === 'finished'
        ? '<span class="badge badge-finished">Finished</span>'
        : v.status === 'started'
          ? '<span class="badge badge-started">Started</span>'
          : '<span class="badge badge-new">New</span>';
      const displayLabels = trash
        ? (v.labels || [])
        : (v.labels || []).filter(l => l.label_id !== 2);
      const chipsHtml = displayLabels.length
        ? `<div class="card-chips-row label-chips">${displayLabels.map(l =>
            `<span class="label-chip">${esc(l.label_name)} <span class="label-chip-date">· ${fmtDateShort(l.labeled_at)}</span></span>`
          ).join('')}</div>`
        : '';
      const labelsJson = esc(JSON.stringify(v.labels || []));
      const sel = selectedIds.has(String(v.id));
      const readerParams = new URLSearchParams();
      const activeLabelsForReader = trashActive ? [2, ...filterLabels] : filterLabels;
      if (filterText) readerParams.set('q', filterText);
      if (activeLabelsForReader.length) readerParams.set('labels', activeLabelsForReader.join(','));
      if (activeLabelsForReader.length > 1) readerParams.set('label_mode', trashActive ? 'and' : filterMode);
      if (filterAfter)  readerParams.set('after',  filterAfter);
      if (filterBefore) readerParams.set('before', filterBefore);
      if (activeCategory) readerParams.set('source', activeCategory);
      const readerQ = readerParams.toString() ? '?' + readerParams.toString() : '';
      const articleActionsHtml = isArticle
        ? `<div class="card-article-actions">
            <a class="card-action-btn open-article" href="${esc(v.url)}" target="_blank" rel="noopener noreferrer">Open Article ↗</a>
            <a class="card-action-btn listen" href="/reader/${v.id}${readerQ}" target="_blank" rel="noopener noreferrer">Listen 🎧</a>
          </div>`
        : '';
      return `
        <li class="video-card${trash ? ' selectable' : ''}${sel ? ' selected' : ''}"
            data-id="${v.id}" data-title="${esc(v.title)}"
            data-url="${esc(v.url)}" data-status="${v.status}"
            data-content-type="${esc(v.content_type || 'video')}"
            data-summary="${esc(v.summary || '')}"
            data-labels="${labelsJson}">
          <span class="card-channel">${esc(v.emoji)} ${esc(v.channel_name)}</span>
          <span class="card-title">${esc(v.title)}</span>
          <div class="card-footer">
            <span class="card-badge">${badge}</span>
            <span class="card-date">${fmtDate(v.added_at)}</span>
            <button class="card-trash-btn" data-id="${v.id}" title="Move to Trash">🗑</button>
          </div>
          ${chipsHtml}
          ${articleActionsHtml}
        </li>`;
    }).join('');
  }

  // ── Trash mode & bulk actions ──────────────────────────────────────────────

  function updateTrashBtn(count) {
    const btn = document.getElementById('btn-show-trash');
    const inTrash = isTrashMode();
    btn.textContent = inTrash ? 'Exit Trash' : (count > 0 ? `Trash (${count})` : 'Trash');
    btn.classList.toggle('has-items', !inTrash && count > 0);
    btn.classList.toggle('active', inTrash);
    document.getElementById('bulk-bar').style.display = inTrash ? '' : 'none';
    if (!inTrash) selectedIds.clear();
    updateBulkBar();
  }

  function updateBulkBar() {
    const n = selectedIds.size;
    document.getElementById('bulk-count').textContent = n === 0 ? '0 selected' : `${n} selected`;
    document.getElementById('btn-bulk-restore').disabled = n === 0;
    document.getElementById('btn-bulk-delete').disabled  = n === 0;
  }

  document.getElementById('btn-show-trash').addEventListener('click', () => {
    trashActive = !trashActive;
    selectedIds.clear();
    load();
  });

  document.getElementById('btn-select-all').addEventListener('click', () => {
    const cards = document.querySelectorAll('#list .video-card.selectable');
    const allSelected = cards.length > 0 && [...cards].every(c => c.classList.contains('selected'));
    if (allSelected) {
      cards.forEach(c => { c.classList.remove('selected'); selectedIds.delete(c.dataset.id); });
    } else {
      cards.forEach(c => { c.classList.add('selected'); selectedIds.add(c.dataset.id); });
    }
    updateBulkBar();
  });

  function confirmBulkAction(btn, label, onConfirm) {
    if (btn.dataset.confirm === 'pending') {
      onConfirm();
      return;
    }
    btn.dataset.confirm = 'pending';
    const orig = btn.textContent;
    btn.textContent = `Sure? (${selectedIds.size})`;
    btn.classList.add('confirming');
    const t = setTimeout(() => {
      btn.dataset.confirm = '';
      btn.textContent = orig;
    }, 3000);
    btn._confirmTimer = t;
  }

  document.getElementById('btn-bulk-restore').addEventListener('click', function() {
    confirmBulkAction(this, 'Restore', async () => {
      const ids = [...selectedIds];
      await Promise.all(ids.map(id => fetch(`/api/videos/${id}/restore`, { method: 'POST' })));
      selectedIds.clear();
      load();
    });
  });

  document.getElementById('btn-bulk-delete').addEventListener('click', function() {
    confirmBulkAction(this, 'Delete', async () => {
      const ids = [...selectedIds];
      await Promise.all(ids.map(id => fetch(`/api/videos/${id}`, { method: 'DELETE' })));
      selectedIds.clear();
      load();
    });
  });

  // ── Active list clicks ─────────────────────────────────────────────────────

  document.getElementById('list').addEventListener('click', async e => {
    const trashBtn = e.target.closest('.card-trash-btn');
    if (trashBtn) {
      await fetch(`/api/videos/${trashBtn.dataset.id}/trash`, { method: 'POST' });
      load();
      return;
    }

    // Article action buttons are <a> links — let them navigate naturally
    if (e.target.closest('.card-article-actions')) return;

    const card = e.target.closest('.video-card');
    if (!card) return;

    if (card.classList.contains('selectable')) {
      const id = card.dataset.id;
      if (selectedIds.has(id)) { selectedIds.delete(id); card.classList.remove('selected'); }
      else                     { selectedIds.add(id);    card.classList.add('selected');    }
      updateBulkBar();
      return;
    }

    // For articles, tapping the card opens the article directly (no action modal)
    if (card.dataset.contentType === 'article') {
      openUrl(card.dataset.url);
      return;
    }

    let labels = [];
    try { labels = JSON.parse(card.dataset.labels || '[]'); } catch {}
    current = {
      id:      card.dataset.id,
      title:   card.dataset.title,
      url:     card.dataset.url,
      status:  card.dataset.status,
      summary: card.dataset.summary || '',
      labels,
    };
    document.getElementById('action-title').textContent = current.title;
    document.getElementById('action-url').textContent   = current.url;
    document.getElementById('action-url-row').style.display = '';
    document.getElementById('action-modal-label').textContent = 'Open video';
    buildActionBtns(current.status);
    document.getElementById('action-overlay').classList.add('open');
  });

  // ── Action modal ───────────────────────────────────────────────────────────

  function buildActionBtns(status) {
    const el = document.getElementById('action-btns');

    if (status === 'new') {
      el.innerHTML = `
        <button class="btn btn-primary"   id="ab-started">Mark as started &amp; open</button>
        <button class="btn btn-secondary" id="ab-just">Just open</button>
        <div class="modal-divider"></div>
        <button class="btn btn-muted"     id="ab-summary">Summary</button>
        <button class="btn btn-indigo"    id="ab-labels">Labels…</button>
        <button class="btn btn-cancel"    id="ab-cancel">Cancel</button>`;
    } else {
      el.innerHTML = `
        <button class="btn btn-secondary" id="ab-just">Just open</button>
        <div class="modal-divider"></div>
        <button class="btn btn-muted"     id="ab-summary">Summary</button>
        <button class="btn btn-indigo"    id="ab-labels">Labels…</button>
        <button class="btn btn-cancel"    id="ab-cancel">Cancel</button>`;
    }

    const started = document.getElementById('ab-started');
    if (started) started.addEventListener('click', () => {
      if (!current) return;
      openUrl(current.url);
      fetch(`/api/videos/${current.id}/started`, { method: 'POST' }).then(load);
      closeActionModal();
    });

    document.getElementById('ab-just').addEventListener('click', () => {
      if (!current) return;
      openUrl(current.url);
      closeActionModal();
    });

    document.getElementById('ab-summary').addEventListener('click', () => {
      if (!current) return;
      const v = { ...current };
      closeActionModal();
      openSummaryOverlay(v);
    });

    document.getElementById('ab-labels').addEventListener('click', showLabelEditor);

    document.getElementById('ab-cancel').addEventListener('click', closeActionModal);
  }

  function showLabelEditor() {
    if (!current) return;
    document.getElementById('action-modal-label').textContent = 'Edit labels';
    document.getElementById('action-url-row').style.display = 'none';

    const currentLabelIds = (current.labels || []).map(l => l.label_id);
    const labeledAtMap = {};
    (current.labels || []).forEach(l => { labeledAtMap[l.label_id] = l.labeled_at; });

    const el = document.getElementById('action-btns');
    el.innerHTML = `
      <div class="label-picker" id="label-editor-picker">
        ${allLabels.map(l => {
          const on = currentLabelIds.includes(l.id);
          const since = on ? `<span class="label-picker-since">since ${fmtDateShort(labeledAtMap[l.id])}</span>` : '';
          return `
            <div class="label-picker-item${on ? ' selected' : ''}" data-label-id="${l.id}" data-on="${on}">
              <span class="label-picker-check">${on ? '✓' : ''}</span>
              <span class="label-picker-name">${esc(l.name)}</span>
              ${since}
            </div>`;
        }).join('')}
      </div>
      <button class="btn btn-indigo" id="ab-labels-apply">Apply</button>
      <button class="btn btn-cancel" id="ab-labels-back">Cancel</button>`;

    document.getElementById('label-editor-picker').addEventListener('click', e => {
      const item = e.target.closest('.label-picker-item');
      if (!item) return;
      const on = item.classList.toggle('selected');
      item.querySelector('.label-picker-check').textContent = on ? '✓' : '';
    });

    document.getElementById('ab-labels-apply').addEventListener('click', async () => {
      if (!current) return;
      const selected = Array.from(
        document.querySelectorAll('#label-editor-picker .label-picker-item.selected')
      ).map(el => parseInt(el.dataset.labelId, 10));
      await fetch(`/api/videos/${current.id}/labels`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ labelIds: selected }),
      });
      closeActionModal();
      load();
    });

    document.getElementById('ab-labels-back').addEventListener('click', () => {
      document.getElementById('action-url-row').style.display = '';
      document.getElementById('action-modal-label').textContent = 'Open video';
      buildActionBtns(current.status);
    });
  }

  document.getElementById('btn-copy-url').addEventListener('click', () => {
    if (!current) return;
    copyText(current.url).then(() => {
      const btn = document.getElementById('btn-copy-url');
      btn.textContent = 'Copied!'; btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
    });
  });

  document.getElementById('action-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('action-overlay')) closeActionModal();
  });

  function closeActionModal() {
    document.getElementById('action-overlay').classList.remove('open');
    current = null;
  }

  // ── Filter modal ───────────────────────────────────────────────────────────

  function buildFilterModal() {
    const list = document.getElementById('filter-label-list');
    const nonSystem = allLabels.filter(l => l.id !== 2); // exclude Trash from filter options
    list.innerHTML = nonSystem.map(l => {
      const sel = filterLabels.includes(l.id);
      return `
        <div class="filter-label-item${sel ? ' selected' : ''}" data-label-id="${l.id}">
          <span class="label-picker-check">${sel ? '✓' : ''}</span>
          <span class="filter-label-name">${esc(l.name)}</span>
        </div>`;
    }).join('');

    document.getElementById('filter-after').value  = filterAfter;
    document.getElementById('filter-before').value = filterBefore;

    updateFilterModeRow();

    // label click handlers
    list.querySelectorAll('.filter-label-item').forEach(item => {
      item.addEventListener('click', () => {
        const lid = parseInt(item.dataset.labelId, 10);
        if (item.classList.contains('selected')) {
          item.classList.remove('selected');
          item.querySelector('.label-picker-check').textContent = '';
        } else {
          item.classList.add('selected');
          item.querySelector('.label-picker-check').textContent = '✓';
        }
        updateFilterModeRow();
      });
    });
  }

  function updateFilterModeRow() {
    const selected = document.querySelectorAll('#filter-label-list .filter-label-item.selected');
    const row = document.getElementById('filter-mode-row');
    row.style.display = selected.length > 1 ? '' : 'none';
    document.getElementById('fmode-or').classList.toggle('active', filterMode === 'or');
    document.getElementById('fmode-and').classList.toggle('active', filterMode === 'and');
  }

  document.getElementById('filter-mode-row').addEventListener('click', e => {
    const btn = e.target.closest('[data-mode]');
    if (!btn) return;
    filterMode = btn.dataset.mode;
    document.getElementById('fmode-or').classList.toggle('active', filterMode === 'or');
    document.getElementById('fmode-and').classList.toggle('active', filterMode === 'and');
  });

  document.getElementById('btn-filter-labels').addEventListener('click', () => {
    buildFilterModal();
    document.getElementById('filter-overlay').classList.add('open');
  });

  document.getElementById('filter-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('filter-overlay')) closeFilterModal();
  });

  document.getElementById('btn-filter-cancel').addEventListener('click', closeFilterModal);

  document.getElementById('btn-filter-apply').addEventListener('click', () => {
    filterLabels = Array.from(
      document.querySelectorAll('#filter-label-list .filter-label-item.selected')
    ).map(el => parseInt(el.dataset.labelId, 10));
    filterAfter  = document.getElementById('filter-after').value;
    filterBefore = document.getElementById('filter-before').value;
    closeFilterModal();
    updateFilterBtn();
    load();
  });

  document.getElementById('btn-filter-clear').addEventListener('click', () => {
    filterLabels = []; filterAfter = ''; filterBefore = '';
    document.querySelectorAll('#filter-label-list .filter-label-item.selected').forEach(el => {
      el.classList.remove('selected');
      el.querySelector('.label-picker-check').textContent = '';
    });
    document.getElementById('filter-after').value  = '';
    document.getElementById('filter-before').value = '';
    updateFilterModeRow();
    updateFilterBtn();
    closeFilterModal();
    load();
  });

  function closeFilterModal() {
    document.getElementById('filter-overlay').classList.remove('open');
  }

  function updateFilterBtn() {
    const hasFilter = filterLabels.length > 0 || filterAfter || filterBefore;
    const btn = document.getElementById('btn-filter-labels');
    btn.classList.toggle('active', hasFilter);
    const count = filterLabels.length + (filterAfter ? 1 : 0) + (filterBefore ? 1 : 0);
    btn.textContent = hasFilter ? `Filter (${count})` : 'Filter';
  }

  // text search with debounce
  let searchTimer = null;
  document.getElementById('filter-text').addEventListener('input', e => {
    clearTimeout(searchTimer);
    filterText = e.target.value.trim();
    searchTimer = setTimeout(load, 300);
  });

  // ── Labels management modal ────────────────────────────────────────────────

  async function openLabelsModal() {
    await loadLabels();
    renderLabelsList();
    document.getElementById('labels-overlay').classList.add('open');
  }

  function renderLabelsList() {
    const list = document.getElementById('labels-list');
    const ul   = allLabels.filter(l => l.id !== 1 && l.id !== 2);
    if (!ul.length) {
      list.innerHTML = '<div style="color:#52525b;font-size:14px;padding:8px 0">No labels yet.</div>';
      return;
    }
    list.innerHTML = ul.map(l => `
      <div class="labels-list-item">
        <span class="labels-list-name">${esc(l.name)}</span>
        <button class="btn-del-label" data-label-id="${l.id}" title="Delete label">✕</button>
      </div>`).join('');

    list.querySelectorAll('.btn-del-label').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = parseInt(btn.dataset.labelId, 10);
        const res = await fetch(`/api/labels/${id}`, { method: 'DELETE' });
        if (!res.ok) {
          const { error } = await res.json();
          btn.style.color = '#f87171';
          setTimeout(() => { btn.style.color = ''; }, 1500);
          btn.title = error || 'cannot delete';
        } else {
          await loadLabels();
          renderLabelsList();
          load();
        }
      });
    });
  }

  document.getElementById('btn-labels').addEventListener('click', openLabelsModal);
  document.getElementById('btn-labels-close').addEventListener('click', () => {
    document.getElementById('labels-overlay').classList.remove('open');
  });
  document.getElementById('labels-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('labels-overlay')) {
      document.getElementById('labels-overlay').classList.remove('open');
    }
  });

  document.getElementById('new-label-input').addEventListener('input', e => {
    document.getElementById('btn-create-label').disabled = !e.target.value.trim();
  });

  document.getElementById('btn-create-label').addEventListener('click', async () => {
    const input = document.getElementById('new-label-input');
    const name  = input.value.trim();
    if (!name) return;
    const res = await fetch('/api/labels', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name }),
    });
    if (res.ok) {
      input.value = '';
      document.getElementById('btn-create-label').disabled = true;
      await loadLabels();
      renderLabelsList();
    } else {
      input.style.borderColor = '#f87171';
      setTimeout(() => { input.style.borderColor = ''; }, 1500);
    }
  });

  // ── Add video modal ────────────────────────────────────────────────────────

  function updateAddBtn() {
    const url   = document.getElementById('add-url').value.trim();
    const title = document.getElementById('add-title').value.trim();
    document.getElementById('btn-add-submit').disabled = !(url && title);
  }

  function autoDetectCategory(url) {
    if (/youtube\.com|youtu\.be/.test(url)) return 'youtube';
    if (/arstechnica\.com/.test(url))       return 'ars_technica';
    return null;
  }

  async function loadCategorySelectOptions(selectId) {
    const sel = document.getElementById(selectId);
    try {
      const cats = await fetch('/api/categories').then(r => r.json());
      // Build a set of sources already in the select
      const existing = new Set(Array.from(sel.options).map(o => o.value).filter(Boolean));
      // Add any categories from the API that aren't already listed
      for (const cat of cats) {
        if (!existing.has(cat.source)) {
          const opt = document.createElement('option');
          opt.value = cat.source;
          opt.textContent = categoryDisplayName(cat.source) + ' (' + cat.count + ')';
          sel.appendChild(opt);
        }
      }
    } catch {}
  }

  document.getElementById('btn-show-add').addEventListener('click', async () => {
    ['add-url','add-title','add-channel'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('add-emoji').value = '📺';
    document.getElementById('add-category').value = 'youtube';
    document.getElementById('fetch-status').textContent = '';
    document.getElementById('fetch-status').className   = 'fetch-status';
    document.getElementById('btn-add-submit').disabled  = true;
    document.getElementById('btn-add-submit').textContent = 'Add to watchlist';
    document.getElementById('add-overlay').classList.add('open');
    await loadCategorySelectOptions('add-category');
    setTimeout(() => document.getElementById('add-url').focus(), 100);
  });

  document.getElementById('add-url').addEventListener('input', () => {
    clearTimeout(fetchTimer);
    updateAddBtn();
    const url = document.getElementById('add-url').value.trim();
    if (!url) { setFetchStatus('', ''); return; }

    // Auto-detect category from URL
    const detected = autoDetectCategory(url);
    if (detected) document.getElementById('add-category').value = detected;

    // Only auto-fetch title for YouTube URLs
    if (/youtube\.com|youtu\.be/.test(url)) {
      setFetchStatus('Fetching title…', '');
      fetchTimer = setTimeout(() => fetchPreview(url), 600);
    }
  });

  document.getElementById('add-title').addEventListener('input', updateAddBtn);

  async function fetchPreview(url) {
    try {
      const res = await fetch(`/api/preview?url=${encodeURIComponent(url)}`);
      if (!res.ok) { setFetchStatus('Could not fetch title — enter it manually', 'err'); return; }
      const { title, channel_name } = await res.json();
      document.getElementById('add-title').value   = title        || '';
      document.getElementById('add-channel').value = channel_name || '';
      setFetchStatus(title ? 'Title fetched ✓' : 'No title returned — enter it manually',
                     title ? 'ok' : 'err');
      updateAddBtn();
    } catch {
      setFetchStatus('Could not fetch title — enter it manually', 'err');
    }
  }

  function setFetchStatus(msg, cls) {
    const el = document.getElementById('fetch-status');
    el.textContent = msg;
    el.className   = 'fetch-status' + (cls ? ' ' + cls : '');
  }

  document.getElementById('btn-add-submit').addEventListener('click', async () => {
    const url      = document.getElementById('add-url').value.trim();
    const title    = document.getElementById('add-title').value.trim();
    const channel  = document.getElementById('add-channel').value.trim();
    const emoji    = document.getElementById('add-emoji').value.trim() || '📺';
    const source   = document.getElementById('add-category').value || 'youtube';
    const content_type = source === 'youtube' ? 'video' : 'article';
    if (!url || !title) return;
    const btn = document.getElementById('btn-add-submit');
    btn.disabled = true; btn.textContent = 'Adding…';
    const res = await fetch('/api/videos', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, title, channel_name: channel, emoji, source, content_type }),
    });
    if (res.ok) {
      closeAddModal(); load();
    } else {
      btn.disabled = false; btn.textContent = 'Add to watchlist';
      setFetchStatus('Error adding — try again', 'err');
    }
  });

  document.getElementById('btn-add-cancel').addEventListener('click', closeAddModal);
  document.getElementById('add-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('add-overlay')) closeAddModal();
  });

  function closeAddModal() {
    document.getElementById('add-overlay').classList.remove('open');
  }

  // ── Summary overlay ────────────────────────────────────────────────────────

  function setCopyBtnsDisabled(disabled) {
    document.querySelectorAll('.btn-copy-opt').forEach(b => b.disabled = disabled);
  }

  async function openSummaryOverlay(video) {
    document.getElementById('summary-overlay-title').textContent = video.title;
    const contentEl = document.getElementById('summary-html-content');
    document.getElementById('summary-overlay').classList.add('open');

    if (video.summary) {
      contentEl.innerHTML = video.summary;
      setCopyBtnsDisabled(false);
      return;
    }

    contentEl.innerHTML = '<p style="color:#71717a;padding:8px 0">Fetching transcript and generating summary…</p>';
    setCopyBtnsDisabled(true);

    try {
      const res  = await fetch(`/api/videos/${video.id}/summary`, { method: 'POST' });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'failed');
      const card = document.querySelector(`.video-card[data-id="${video.id}"]`);
      if (card) card.dataset.summary = data.summary;
      contentEl.innerHTML = data.summary;
      setCopyBtnsDisabled(false);
    } catch (err) {
      contentEl.innerHTML = `<p style="color:#f87171">Could not generate summary: ${err.message}</p>`;
      setCopyBtnsDisabled(false);
    }
  }

  function closeSummaryOverlay() {
    document.getElementById('summary-overlay').classList.remove('open');
  }

  document.getElementById('summary-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('summary-overlay')) closeSummaryOverlay();
  });
  document.getElementById('btn-summary-overlay-close').addEventListener('click', closeSummaryOverlay);

  function htmlToMarkdown(html) {
    const div = document.createElement('div');
    div.innerHTML = html;
    function toMd(node) {
      if (node.nodeType === Node.TEXT_NODE) return node.textContent;
      if (node.nodeType !== Node.ELEMENT_NODE) return '';
      const tag   = node.tagName.toLowerCase();
      const inner = Array.from(node.childNodes).map(toMd).join('');
      switch (tag) {
        case 'h3': case 'h4': return `### ${inner}\n\n`;
        case 'p':  return `${inner}\n\n`;
        case 'ul': return Array.from(node.children).map(li => `- ${toMd(li).trim()}`).join('\n') + '\n\n';
        case 'ol': return Array.from(node.children).map((li, i) => `${i+1}. ${toMd(li).trim()}`).join('\n') + '\n\n';
        case 'li': return inner;
        case 'strong': case 'b': return `**${inner}**`;
        case 'em':     case 'i': return `*${inner}*`;
        default: return inner;
      }
    }
    return Array.from(div.childNodes).map(toMd).join('').trim();
  }

  function flashCopyBtn(btn, original) {
    btn.textContent = 'Copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = original; btn.classList.remove('copied'); }, 1500);
  }

  document.getElementById('btn-copy-plain').addEventListener('click', () => {
    const text = document.getElementById('summary-html-content').innerText;
    copyText(text).then(() => flashCopyBtn(document.getElementById('btn-copy-plain'), 'Plain text'));
  });
  document.getElementById('btn-copy-html').addEventListener('click', () => {
    const html = document.getElementById('summary-html-content').innerHTML;
    copyText(html).then(() => flashCopyBtn(document.getElementById('btn-copy-html'), 'HTML'));
  });
  document.getElementById('btn-copy-md').addEventListener('click', () => {
    const md = htmlToMarkdown(document.getElementById('summary-html-content').innerHTML);
    copyText(md).then(() => flashCopyBtn(document.getElementById('btn-copy-md'), 'Markdown'));
  });

  // ── Category filter ────────────────────────────────────────────────────────

  async function loadCategories() {
    try {
      const cats = await fetch('/api/categories').then(r => r.json());
      const sel = document.getElementById('category-filter');
      // Remove all options except the first "All Categories"
      while (sel.options.length > 1) sel.remove(1);
      for (const cat of cats) {
        const opt = document.createElement('option');
        opt.value = cat.source;
        opt.textContent = categoryDisplayName(cat.source) + ' (' + cat.count + ')';
        sel.appendChild(opt);
      }
      // Restore selection
      if (activeCategory) sel.value = activeCategory;
      sel.classList.toggle('active', !!activeCategory);
    } catch {}
  }

  document.getElementById('category-filter').addEventListener('change', e => {
    activeCategory = e.target.value;
    e.target.classList.toggle('active', !!activeCategory);
    // Update URL without reload
    const url = new URL(window.location.href);
    if (activeCategory) url.searchParams.set('category', activeCategory);
    else url.searchParams.delete('category');
    history.pushState({}, '', url.toString());
    load();
  });

  // ── Init ───────────────────────────────────────────────────────────────────

  async function init() {
    // Read category from URL
    const urlParams = new URLSearchParams(window.location.search);
    const catFromUrl = urlParams.get('category') || '';
    if (catFromUrl) {
      activeCategory = catFromUrl;
      document.getElementById('category-filter').value = catFromUrl;
      document.getElementById('category-filter').classList.add('active');
    }

    await loadLabels();
    await loadCategories();
    load();
  }

  init();
  setInterval(load, 30000);
</script>
</body>
</html>
